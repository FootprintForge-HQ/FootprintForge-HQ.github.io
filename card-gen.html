<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Footprint Forge Card Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0e0e10;
  color: white;
  padding: 40px;
  display: flex;
  gap: 60px;
  flex-wrap: wrap;
}

/* Controls */
.controls {
  width: 320px;
}

.controls input {
  width: 100%;
  margin-bottom: 14px;
  padding: 10px;
  background: #1a1a1f;
  border: 1px solid #2a2a2f;
  color: white;
  border-radius: 6px;
}

button {
  padding: 10px;
  background: #c27e42;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
  margin-top: 6px;
  width: 100%;
}

/* Card */
.card {
  width: 430px;
  height: 271px;
  background: #111111;
  border-radius: 20px;
  padding: 30px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.copper {
  color: #c27e42;
}

.brand-name {
  font-size: 18px;
  letter-spacing: 6px;
  font-weight: 500;
}

.tagline {
  font-size: 12px;
  opacity: 0.85;
}

.logo {
  max-width: 120px;
  margin-bottom: 20px;
}

.center {
  text-align: center;
}

#qrcode {
  width: 160px;
  height: 160px;
  margin: 0 auto;
}

.name {
  font-weight: 600;
  font-size: 15px;
}

.role {
  font-size: 12px;
  opacity: 0.6;
}

.details {
  font-size: 11px;
  line-height: 1.6;
  opacity: 0.85;
}
</style>
</head>

<body>

<div class="controls">
  <h3>Edit Details</h3>

  <input type="text" id="nameInput" placeholder="Full Name">
  <input type="text" id="roleInput" placeholder="Role / Title">
  <input type="text" id="phoneInput" placeholder="Phone">
  <input type="text" id="emailInput" placeholder="Email">
  <input type="text" id="qrInput" placeholder="QR Destination URL">

  <label style="font-size:12px;opacity:.6;">Upload Logo</label>
  <input type="file" id="logoUpload" accept="image/*">

  <button onclick="downloadCard('frontCard')">Download Front</button>
  <button onclick="downloadCard('backCard')">Download Back</button>
</div>

<!-- FRONT -->
<div class="card center" id="frontCard">

  <div>
    <img id="logoPreview" class="logo" />
  </div>

  <div class="copper brand-name">
    FOOTPRINT FORGE
  </div>

  <div class="copper tagline">
    Forge Your Digital Identity
  </div>

</div>

<!-- BACK -->
<div class="card" id="backCard">

  <div id="qrcode"></div>

  <div class="center copper" style="font-size:12px;">
    SCAN TO CONNECT
  </div>

  <div>
    <div class="name" id="previewName">Your Name</div>
    <div class="role" id="previewRole">Your Role</div>
    <div class="details">
      <div id="previewPhone"></div>
      <div id="previewEmail"></div>
    </div>
  </div>

</div>

<script>
function generateQR(url) {
  document.getElementById("qrcode").innerHTML = "";
  if (!url) return;

  new QRCode(document.getElementById("qrcode"), {
    text: url,
    width: 160,
    height: 160,
    colorDark: "#ffffff",
    colorLight: "#111111",
    correctLevel: QRCode.CorrectLevel.H
  });
}

document.getElementById("qrInput").addEventListener("input", function() {
  generateQR(this.value);
});

document.getElementById("nameInput").addEventListener("input", function() {
  document.getElementById("previewName").textContent = this.value;
});

document.getElementById("roleInput").addEventListener("input", function() {
  document.getElementById("previewRole").textContent = this.value;
});

document.getElementById("phoneInput").addEventListener("input", function() {
  document.getElementById("previewPhone").textContent = this.value;
});

document.getElementById("emailInput").addEventListener("input", function() {
  document.getElementById("previewEmail").textContent = this.value;
});

document.getElementById("logoUpload").addEventListener("change", function(event) {
  const reader = new FileReader();
  reader.onload = function() {
    document.getElementById("logoPreview").src = reader.result;
  };
  reader.readAsDataURL(event.target.files[0]);
});

function downloadCard(cardId) {
  const card = document.getElementById(cardId);
  html2canvas(card, { scale: 3 }).then(canvas => {
    const link = document.createElement("a");
    link.download = cardId + ".png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
