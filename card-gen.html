<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Footprint Forge Card Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0e0e10;
  color: white;
  margin: 0;
  padding: 40px;
  display: flex;
  gap: 50px;
  flex-wrap: wrap;
}

.controls {
  width: 320px;
}

.controls h2 {
  font-weight: 500;
  letter-spacing: 1px;
}

.controls label {
  font-size: 12px;
  opacity: 0.7;
}

.controls input {
  width: 100%;
  margin-bottom: 14px;
  padding: 10px;
  background: #1a1a1f;
  border: 1px solid #2a2a2f;
  color: white;
  border-radius: 6px;
}

button {
  padding: 10px 14px;
  background: #c27e42;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
  margin-top: 6px;
  width: 100%;
}

/* CARD */

.card-container {
  display: flex;
  gap: 40px;
}

.card {
  width: 430px;
  height: 271px;
  background: #111111;
  border-radius: 16px;
  padding: 28px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.brand {
  font-size: 13px;
  letter-spacing: 4px;
  font-weight: 500;
}

.tagline {
  font-size: 10px;
  opacity: 0.6;
}

.logo {
  max-width: 100px;
  max-height: 45px;
  margin-bottom: 10px;
}

#qrcode {
  width: 120px;
  height: 120px;
  margin: auto;
}

.name {
  font-size: 16px;
  font-weight: 600;
}

.role {
  font-size: 12px;
  opacity: 0.6;
}

.details {
  font-size: 11px;
  line-height: 1.6;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="controls">
  <h2>Card Editor</h2>

  <label>Full Name</label>
  <input type="text" id="nameInput" placeholder="Arjun Ravi">

  <label>Role / Title</label>
  <input type="text" id="roleInput" placeholder="Founder">

  <label>Phone</label>
  <input type="text" id="phoneInput" placeholder="+91 98765 43210">

  <label>Email</label>
  <input type="text" id="emailInput" placeholder="arjun@footprintforge.com">

  <label>QR Destination URL</label>
  <input type="text" id="qrInput" placeholder="https://yourgithubpage.github.io">

  <label>Upload Logo</label>
  <input type="file" id="logoUpload" accept="image/*">

  <button onclick="downloadCard('frontCard')">Download Front</button>
  <button onclick="downloadCard('backCard')">Download Back</button>
</div>

<div class="card-container">

  <!-- FRONT -->
  <div class="card" id="frontCard">
    <div>
      <img id="logoPreview" class="logo" />
      <div class="brand">FOOTPRINT FORGE</div>
      <div class="tagline">Forge Your Digital Identity</div>
    </div>

    <div id="qrcode"></div>

    <div class="tagline" style="text-align:center;">
      SCAN TO CONNECT
    </div>
  </div>

  <!-- BACK -->
  <div class="card" id="backCard">
    <div>
      <div class="name" id="previewName">Arjun Ravi</div>
      <div class="role" id="previewRole">Founder</div>
    </div>

    <div class="details">
      <div id="previewPhone">+91 98765 43210</div>
      <div id="previewEmail">arjun@footprintforge.com</div>
    </div>

    <div class="tagline">
      Digital identity infrastructure for modern professionals.
    </div>
  </div>

</div>

<script>
function generateQR(url) {
  document.getElementById("qrcode").innerHTML = "";
  if (!url) return;

  new QRCode(document.getElementById("qrcode"), {
    text: url,
    width: 120,
    height: 120,
    colorDark: "#ffffff",
    colorLight: "#111111",
    correctLevel: QRCode.CorrectLevel.H
  });
}

document.getElementById("qrInput").addEventListener("input", function() {
  generateQR(this.value);
});

document.getElementById("nameInput").addEventListener("input", function() {
  document.getElementById("previewName").textContent = this.value;
});

document.getElementById("roleInput").addEventListener("input", function() {
  document.getElementById("previewRole").textContent = this.value;
});

document.getElementById("phoneInput").addEventListener("input", function() {
  document.getElementById("previewPhone").textContent = this.value;
});

document.getElementById("emailInput").addEventListener("input", function() {
  document.getElementById("previewEmail").textContent = this.value;
});

document.getElementById("logoUpload").addEventListener("change", function(event) {
  const reader = new FileReader();
  reader.onload = function() {
    document.getElementById("logoPreview").src = reader.result;
  };
  reader.readAsDataURL(event.target.files[0]);
});

function downloadCard(cardId) {
  const card = document.getElementById(cardId);
  html2canvas(card, { scale: 3 }).then(canvas => {
    const link = document.createElement("a");
    link.download = cardId + ".png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
