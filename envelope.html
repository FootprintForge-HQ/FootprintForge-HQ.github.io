<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Footprint Forge | Envelope Generator</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Inter', sans-serif;
      margin: 0;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }

    /* Copper Foil Text Effect (Screen) */
    .copper-text {
      background: linear-gradient(135deg, #e6b981 0%, #c27e42 50%, #8a5a2e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .copper-bg {
      background: linear-gradient(135deg, #e6b981 0%, #c27e42 50%, #8a5a2e 100%);
    }

    /* --- THE SINGLE-CUTOUT NET ARCHITECTURE WITH 5MM GUSSET --- */
    .net-wrapper {
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.15));
      margin-bottom: 40px;
    }

    .net-container {
      position: relative;
      width: 270mm;
      height: 275mm;
      background-color: #111111; /* Matte Black Base */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
      
      clip-path: polygon(
        35mm 0,       
        235mm 0,      
        245mm 45mm,   
        245mm 50mm,   
        250mm 50mm,   
        270mm 55mm,   
        270mm 155mm,  
        250mm 160mm,  
        245mm 160mm,  
        245mm 165mm,  
        240mm 275mm,  
        30mm 275mm,   
        25mm 165mm,   
        25mm 160mm,   
        20mm 160mm,   
        0 155mm,      
        0 55mm,       
        20mm 50mm,    
        25mm 50mm,    
        25mm 45mm     
      );
    }

    .font-serif { font-family: 'Playfair Display', serif; }

    /* Print Specific Styles - CMYK OPTIMIZATIONS */
    @media print {
      body {
        background-color: white !important;
        padding: 0;
        margin: 0;
      }
      
      .no-print { display: none !important; }
      
      .net-wrapper {
        filter: none;
        margin: 5mm auto;
      }
      
      @page {
        size: A3 portrait; /* MUST BE A3 to fit the 270mm width */
        margin: 10mm;
      }

      /* CMYK Printer Optimizations */
      .net-container {
        background-color: #1A1A1A !important; 
        background-image: none !important; 
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      
      .copper-text {
        background: none !important;
        -webkit-text-fill-color: #C27A3E !important;
        color: #C27A3E !important; 
      }

      .copper-bg { background: #C27A3E !important; }

      .text-white { color: #FFFFFF !important; }
      .text-gray-400, .text-gray-500, .text-gray-600 { color: #999999 !important; }
    }
  </style>
</head>
<body>
  <div id="root" class="w-full min-h-screen"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function EnvelopeGenerator() {
      // Default Form State
      const [formData, setFormData] = useState({
        clientName: "Alexander Chen",
        addressLine1: "Level 4, Marina Towers",
        addressLine2: "Egmore",
        cityStateZip: "Chennai, TN 600008",
        country: "India",
        mobile: "+91 98840 12345"
      });
      
      const [logoUrl, setLogoUrl] = useState("1000441850.png");
      const [activeTab, setActiveTab] = useState('edit');
      
      // Viewport Scaling State for Envelope Net
      const previewContainerRef = useRef(null);
      const [scale, setScale] = useState(1);

      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setLogoUrl(event.target.result);
          reader.readAsDataURL(file);
        }
      };

      const handlePrint = () => {
        window.print();
      };

      // Dynamic viewport scaling engine for mobile/laptop
      useEffect(() => {
        const handleResize = () => {
          if (previewContainerRef.current) {
            const containerWidth = previewContainerRef.current.clientWidth;
            const netWidthPx = 1020; // approx 270mm in pixels at 96dpi
            const padding = 40; 
            
            if (containerWidth < netWidthPx + padding) {
              setScale((containerWidth - padding) / netWidthPx);
            } else {
              setScale(1);
            }
          }
        };

        handleResize();
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [activeTab]);

      return (
        <div className="flex flex-col lg:flex-row w-full min-h-screen relative">
          
          {/* LEFT: CONTROL PANEL */}
          <div className={`no-print w-full lg:w-[400px] bg-white border-r border-gray-200 p-6 flex flex-col min-h-screen overflow-y-auto shadow-xl z-10 shrink-0 pb-28 lg:pb-6 ${activeTab === 'edit' ? 'flex' : 'hidden lg:flex'}`}>
            <div className="flex items-center gap-3 mb-6">
              <div className="w-10 h-10 rounded-full bg-black flex items-center justify-center border border-[#c27e42]">
                <i className="fa-solid fa-envelope-open-text text-[#c27e42]"></i>
              </div>
              <div>
                <h1 className="text-sm font-bold tracking-widest uppercase">Envelope Generator</h1>
                <p className="text-xs text-gray-500 font-mono">Custom Address Print</p>
              </div>
            </div>

            <div className="space-y-5 flex-1">
              
              <div className="bg-gray-50 p-3 rounded border border-gray-200">
                <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-2">Custom Logo Upload</label>
                <input type="file" accept="image/*" onChange={handleLogoUpload} className="w-full text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-[#c27e42]/10 file:text-[#c27e42] hover:file:bg-[#c27e42]/20 cursor-pointer outline-none" />
              </div>

              <div>
                <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-1">Customer Name</label>
                <input type="text" value={formData.clientName} onChange={(e) => setFormData({...formData, clientName: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-[#c27e42] focus:border-[#c27e42] outline-none" />
              </div>

              <div className="pt-2">
                <label className="block text-xs font-bold text-[#c27e42] uppercase tracking-wide mb-3"><i className="fa-solid fa-truck-fast"></i> Delivery Address</label>
                
                <div className="space-y-3">
                  <input type="text" placeholder="Address Line 1" value={formData.addressLine1} onChange={(e) => setFormData({...formData, addressLine1: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  <input type="text" placeholder="Address Line 2 (Optional)" value={formData.addressLine2} onChange={(e) => setFormData({...formData, addressLine2: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  <input type="text" placeholder="City, State Zip" value={formData.cityStateZip} onChange={(e) => setFormData({...formData, cityStateZip: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  <input type="text" placeholder="Country" value={formData.country} onChange={(e) => setFormData({...formData, country: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  <input type="text" placeholder="Mobile Number" value={formData.mobile} onChange={(e) => setFormData({...formData, mobile: e.target.value})} className="w-full text-xs p-2.5 border border-gray-300 rounded outline-none" />
                </div>
              </div>
            </div>

            <div className="mt-8 pt-6 border-t border-gray-200">
              <div className="bg-amber-50 border border-amber-200 text-amber-800 text-xs p-3 rounded mb-4 font-medium flex flex-col gap-2">
                <span><i className="fa-solid fa-triangle-exclamation mr-1"></i> Print on <strong>A3 paper only</strong>. A4 will cut off the side flaps.</span>
                <span><i className="fa-solid fa-check mr-1"></i> Ensure "Print Background Graphics" is enabled. Scale must be 100%.</span>
              </div>
              <button onClick={handlePrint} className="w-full bg-[#c27e42] hover:bg-[#a66731] text-white font-bold uppercase tracking-wider py-3.5 rounded shadow-lg transition-colors flex justify-center items-center gap-2">
                <i className="fa-solid fa-print"></i> Print Envelope
              </button>
            </div>
          </div>

          {/* RIGHT: ENVELOPE PREVIEW */}
          <div 
            ref={previewContainerRef} 
            className={`flex-1 bg-gray-100 overflow-y-auto flex-col items-center pt-8 pb-28 lg:pb-10 print:!block print:!p-0 print:!bg-white ${activeTab === 'preview' ? 'flex' : 'hidden lg:flex'}`}
          >
            {/* Dynamic Scaled Wrapper */}
            <div 
              style={{ 
                transform: `scale(${scale})`, 
                transformOrigin: 'top center',
                marginBottom: scale < 1 ? `-${275 * (1 - scale)}mm` : '0' 
              }}
              className="print:!transform-none print:!m-0 transition-transform duration-200"
            >
              
              <div className="net-wrapper print:!filter-none">
                <div className="net-container text-white font-sans">
                  
                  {/* ==================== FOLD LINES (THE 5MM SPINES) ==================== */}
                  <div className="absolute top-[45mm] left-[25mm] w-[220mm] border-t border-dashed border-[#c27e42] z-10 opacity-70"></div>
                  <div className="absolute top-[50mm] left-[25mm] w-[220mm] border-t border-dashed border-[#c27e42] z-10 opacity-70"></div>
                  
                  <div className="absolute top-[160mm] left-[25mm] w-[220mm] border-t border-dashed border-[#c27e42] z-10 opacity-70"></div>
                  <div className="absolute top-[165mm] left-[25mm] w-[220mm] border-t border-dashed border-[#c27e42] z-10 opacity-70"></div>

                  <div className="absolute top-[50mm] left-[20mm] h-[110mm] border-l border-dashed border-[#c27e42] z-10 opacity-70"></div>
                  <div className="absolute top-[50mm] left-[25mm] h-[110mm] border-l border-dashed border-[#c27e42] z-10 opacity-70"></div>

                  <div className="absolute top-[50mm] left-[245mm] h-[110mm] border-l border-dashed border-[#c27e42] z-10 opacity-70"></div>
                  <div className="absolute top-[50mm] left-[250mm] h-[110mm] border-l border-dashed border-[#c27e42] z-10 opacity-70"></div>

                  {/* Glue Indicators */}
                  <div className="absolute top-[100mm] left-[5mm] text-[3mm] text-gray-500 transform -rotate-90 uppercase tracking-widest opacity-40 font-bold z-10">Glue</div>
                  <div className="absolute top-[100mm] left-[255mm] text-[3mm] text-gray-500 transform rotate-90 uppercase tracking-widest opacity-40 font-bold z-10">Glue</div>

                  {/* ==================== TOP FLAP ==================== */}
                  <div className="absolute top-0 left-[25mm] w-[220mm] h-[45mm]">
                    <div className="absolute top-[6mm] left-[101mm] transform rotate-180 w-[18mm] h-[18mm] rounded-full copper-bg p-[0.5mm] shadow-[0_0_10px_rgba(194,126,66,0.3)]">
                      <div className="w-full h-full bg-[#0a0a0a] rounded-full flex flex-col items-center justify-center border border-[#111]">
                        <i className="fa-solid fa-fingerprint copper-text text-[6mm] mb-[0.5mm]"></i>
                        <span className="text-[1.8mm] uppercase tracking-[0.2em] copper-text font-bold leading-none">Secured</span>
                      </div>
                    </div>
                  </div>

                  {/* ==================== FRONT PANEL ==================== */}
                  <div className="absolute top-[50mm] left-[25mm] w-[220mm] h-[110mm] p-[10mm]">
                    
                    {/* Header: Return Address & Stamp */}
                    <div className="flex justify-between items-start">
                      <div className="flex gap-3">
                        <div className="w-[12mm] h-[12mm] rounded-full border border-[#c27e42] flex items-center justify-center bg-black overflow-hidden shrink-0 mt-1">
                          <img src={logoUrl} alt="FF" className="w-full h-full object-cover" onError={(e) => { e.target.style.display='none'; }} />
                        </div>
                        <div>
                          <h2 className="text-[3.5mm] font-bold tracking-[0.2em] text-white uppercase mb-[1mm] leading-none">Footprint Forge</h2>
                          <p className="text-[2.2mm] text-gray-400 font-mono leading-[1.4] tracking-wide uppercase">
                            362, L Block, West Cementry Road<br/>
                            Oldwashermenpet, Chennai-600021<br/>
                            Mob: +919952041493<br/>
                            footprintforge-hq.github.io
                          </p>
                        </div>
                      </div>
                      
                      <div className="border border-[#c27e42] px-[2mm] py-[1mm] rounded flex items-center gap-[1mm]">
                        <i className="fa-solid fa-plane-departure text-[#c27e42] text-[2.5mm]"></i>
                        <span className="text-[#c27e42] text-[2mm] font-bold tracking-widest uppercase">Priority</span>
                      </div>
                    </div>

                    {/* CUSTOM DESTINATION PRINT BLOCK */}
                    <div className="absolute bottom-[12mm] left-[15mm] z-10 w-[90mm]">
                      <p className="text-[2.5mm] uppercase tracking-widest text-[#c27e42] font-bold mb-[1mm]">Deliver To:</p>
                      <h3 className="font-serif font-bold text-[5.5mm] text-white mb-[1mm] leading-tight">{formData.clientName}</h3>
                      <p className="font-mono text-[3mm] text-gray-300 leading-[1.4]">
                        {formData.addressLine1}<br/>
                        {formData.addressLine2 && <>{formData.addressLine2}<br/></>}
                        {formData.cityStateZip}<br/>
                        {formData.country}
                      </p>
                      <div className="mt-[2mm] text-[2.5mm] font-mono text-[#c27e42] font-semibold tracking-wide">
                        {formData.mobile && <span><i className="fa-solid fa-phone text-[2mm] mr-1"></i> {formData.mobile}</span>}
                      </div>
                    </div>

                    {/* Markings */}
                    <div className="absolute bottom-[10mm] right-[10mm] text-right flex flex-col items-end gap-1">
                      <span className="text-[2.5mm] font-bold tracking-[0.3em] text-gray-500 uppercase border border-gray-600 px-[2mm] py-[0.5mm] rounded">Do Not Bend</span>
                      <span className="text-[2mm] font-mono text-gray-600 uppercase">Contents: Digital Infrastructure</span>
                    </div>
                  </div>

                  {/* ==================== BACK PANEL ==================== */}
                  <div className="absolute top-[165mm] left-[25mm] w-[220mm] h-[110mm]">
                    <div className="absolute top-[8mm] w-full text-center transform rotate-180">
                      <h2 className="font-serif italic text-[5mm] copper-text mb-[1mm]">Identity Infrastructure.</h2>
                      <p className="text-[2mm] uppercase tracking-[0.3em] text-gray-600">Engineered in Chennai</p>
                      <p className="text-[1.5mm] uppercase tracking-[0.2em] text-gray-700 mt-[1mm]">MSME: UDYAM-TN-02-0455866</p>
                    </div>
                  </div>

                </div>
              </div>

            </div>
          </div>

          {/* MOBILE STICKY BOTTOM NAVIGATION */}
          <div className="lg:hidden no-print fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 flex gap-3 z-50 shadow-[0_-4px_15px_rgba(0,0,0,0.05)]">
            {activeTab === 'edit' ? (
              <button onClick={() => setActiveTab('preview')} className="flex-1 bg-gray-900 hover:bg-black text-white py-3 rounded-lg font-bold tracking-wide transition-colors">
                View Print Template
              </button>
            ) : (
              <>
                <button onClick={() => setActiveTab('edit')} className="flex-1 border border-gray-300 text-gray-700 py-3 rounded-lg font-bold tracking-wide">
                  Edit Details
                </button>
                <button onClick={handlePrint} className="flex-1 bg-[#c27e42] text-white py-3 rounded-lg font-bold tracking-wide flex items-center justify-center gap-2 shadow-lg shadow-[#c27e42]/20">
                  <i className="fa-solid fa-print"></i> Print
                </button>
              </>
            )}
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EnvelopeGenerator />);
  </script>
</body>
</html>
