<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footprint Forge | Welcome Letter Generator</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Inter', sans-serif;
      margin: 0;
      color: #111;
    }

    /* A4 Paper Dimensions and Styling */
    .a4-paper {
      width: 210mm;
      height: 297mm;
      background-color: #ffffff;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0,0,0,0.05);
      position: relative;
      box-sizing: border-box;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
    }

    .font-serif { font-family: 'Playfair Display', serif; }

    /* Address Window alignment */
    .window-address-block {
      position: absolute;
      top: 62mm;
      left: 18mm;
      width: 85mm;
      height: 31mm;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Fold Guides */
    .fold-guide {
      position: absolute;
      left: 0;
      width: 100%;
      border-top: 1px dashed rgba(0,0,0,0.1);
      z-index: 50;
    }
    .fold-1 { top: 99mm; }
    .fold-2 { top: 198mm; }
    
    .fold-tick {
      position: absolute;
      width: 3mm;
      border-top: 0.5px solid rgba(0,0,0,0.3);
    }
    .tick-left { left: 0; }
    .tick-right { right: 0; }

    /* PVC Card Mount Area */
    .card-mount {
      position: absolute;
      top: 135mm;
      left: 50%;
      transform: translateX(-50%);
      width: 85.6mm;
      height: 54mm;
      border: 1.5px dashed #c27e42;
      border-radius: 4mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(194, 126, 66, 0.03);
    }

    @media print {
      body {
        background-color: transparent !important;
        margin: 0;
      }
      .no-print { display: none !important; }
      
      .a4-paper {
        margin: 0 !important;
        box-shadow: none !important;
        background-image: none !important;
        border: none !important;
      }

      .fold-guide { border-color: transparent !important; }

      @page {
        size: A4 portrait;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div id="root" class="w-full min-h-screen"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function LetterGenerator() {
      // Default State
      const [formData, setFormData] = useState({
        clientName: "Alexander Chen",
        role: "Director, Commercial Banking",
        addressLine1: "Level 4, Marina Towers",
        addressLine2: "Egmore",
        cityStateZip: "Chennai, TN 600008",
        country: "India",
        mobile: "+91 98840 12345",
        email: "alexander@example.com",
        refId: "AC-0894"
      });
      
      // Logo State
      const [logoUrl, setLogoUrl] = useState("FootprintForge_CircularSeal.jpg");

      // Generate Ref ID automatically when name changes
      const handleNameChange = (e) => {
        const name = e.target.value;
        const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        const ref = `${initials || 'XX'}-${Math.floor(1000 + Math.random() * 9000)}`;
        setFormData({ ...formData, clientName: name, refId: ref });
      };

      // Handle custom logo file upload
      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setLogoUrl(event.target.result);
          reader.readAsDataURL(file);
        }
      };

      const handlePrint = () => {
        window.print();
      };

      // Extract first name for greeting
      const firstName = formData.clientName.split(' ')[0] || 'Client';
      
      // Get today's date formatted
      const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

      return (
        <div className="flex flex-col lg:flex-row w-full min-h-screen">
          
          {/* LEFT: CONTROL PANEL (Hidden on Print) */}
          <div className="no-print w-full lg:w-[400px] bg-white border-r border-gray-200 p-6 flex flex-col h-screen overflow-y-auto shadow-xl z-10 shrink-0">
            <div className="flex items-center gap-3 mb-8">
              <div className="w-10 h-10 rounded-full bg-black flex items-center justify-center border border-[#c27e42]">
                <i className="fa-solid fa-fingerprint text-[#c27e42]"></i>
              </div>
              <div>
                <h1 className="text-sm font-bold tracking-widest uppercase">Letter Generator</h1>
                <p className="text-xs text-gray-500 font-mono">A4 Trifold Layout</p>
              </div>
            </div>

            <div className="space-y-5 flex-1">
              {/* Logo Upload Section */}
              <div className="bg-gray-50 p-3 rounded border border-gray-200">
                <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-2">Custom Logo Upload</label>
                <input type="file" accept="image/*" onChange={handleLogoUpload} className="w-full text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-[#c27e42]/10 file:text-[#c27e42] hover:file:bg-[#c27e42]/20 cursor-pointer outline-none" />
              </div>

              <div>
                <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-1">Client Name</label>
                <input type="text" value={formData.clientName} onChange={handleNameChange} className="w-full text-sm p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-[#c27e42] focus:border-[#c27e42] outline-none" />
              </div>
              
              <div>
                <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-1">Role / Title</label>
                <input type="text" value={formData.role} onChange={(e) => setFormData({...formData, role: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-[#c27e42] outline-none" />
              </div>

              <div className="pt-4 border-t border-gray-100">
                <label className="block text-xs font-bold text-[#c27e42] uppercase tracking-wide mb-3"><i className="fa-regular fa-envelope"></i> Window Address Details</label>
                
                <div className="space-y-3">
                  <input type="text" placeholder="Address Line 1" value={formData.addressLine1} onChange={(e) => setFormData({...formData, addressLine1: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  <input type="text" placeholder="Address Line 2 (Optional)" value={formData.addressLine2} onChange={(e) => setFormData({...formData, addressLine2: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  <input type="text" placeholder="City, State Zip" value={formData.cityStateZip} onChange={(e) => setFormData({...formData, cityStateZip: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  <input type="text" placeholder="Country" value={formData.country} onChange={(e) => setFormData({...formData, country: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  
                  <div className="grid grid-cols-2 gap-3 pt-2">
                    <input type="text" placeholder="Mobile" value={formData.mobile} onChange={(e) => setFormData({...formData, mobile: e.target.value})} className="w-full text-xs p-2.5 border border-gray-300 rounded outline-none" />
                    <input type="email" placeholder="Email" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} className="w-full text-xs p-2.5 border border-gray-300 rounded outline-none" />
                  </div>
                </div>
              </div>

              <div className="pt-4 border-t border-gray-100">
                <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-1">Reference ID</label>
                <input type="text" value={formData.refId} onChange={(e) => setFormData({...formData, refId: e.target.value})} className="w-full text-sm p-2.5 bg-gray-50 border border-gray-300 rounded font-mono text-gray-600 outline-none" />
              </div>
            </div>

            <div className="mt-8 pt-6 border-t border-gray-200">
              <div className="bg-amber-50 text-amber-800 text-xs p-3 rounded mb-4 font-medium">
                <i className="fa-solid fa-circle-info mr-1"></i> Ensure printer scale is set exactly to 100%. Print on A4 size, 120gsm textured paper.
              </div>
              <button onClick={handlePrint} className="w-full bg-[#c27e42] hover:bg-[#a66731] text-white font-bold uppercase tracking-wider py-3.5 rounded shadow-lg transition-colors flex justify-center items-center gap-2">
                <i className="fa-solid fa-print"></i> Print Letter
              </button>
            </div>
          </div>

          {/* RIGHT: A4 PREVIEW */}
          <div className="flex-1 bg-gray-100 overflow-y-auto p-10 flex justify-center print:p-0 print:overflow-visible">
            
            <div className="a4-paper text-black relative">
              
              <div className="fold-guide fold-1">
                <div className="fold-tick tick-left"></div>
                <div className="fold-tick tick-right"></div>
              </div>
              <div className="fold-guide fold-2">
                <div className="fold-tick tick-left"></div>
                <div className="fold-tick tick-right"></div>
              </div>

              {/* PANEL 1: HEADER & WINDOW ADDRESS (0 - 99mm) */}
              
              {/* Letterhead with Logo */}
              <div className="absolute top-[20mm] right-[20mm] flex items-start gap-3">
                <div className="text-right">
                  <h2 className="text-[14px] font-bold tracking-[0.2em] text-[#111] uppercase mb-[2px]">Footprint Forge</h2>
                  <p className="text-[10px] text-gray-500 font-mono tracking-wide uppercase">Identity Infrastructure</p>
                  <div className="w-[30mm] h-[1px] bg-[#c27e42] ml-auto mt-2 mb-2"></div>
                  <p className="text-[8px] text-gray-500 font-mono leading-relaxed">
                    362, L Block, West Cementry Road<br/>
                    Oldwashermenpet, Chennai-600021<br/>
                    footprintforge-hq.github.io
                  </p>
                </div>
                {/* Dynamic Logo Image */}
                <div className="w-[16mm] h-[16mm] rounded-full border border-[#c27e42] flex items-center justify-center bg-black overflow-hidden shrink-0 mt-[1mm]">
                  <img src={logoUrl} alt="Logo" className="w-full h-full object-cover" onError={(e) => { e.target.style.display='none'; e.target.parentNode.innerHTML='<i class="fa-solid fa-fingerprint text-[#c27e42] text-[6mm]"></i>'; }} />
                </div>
              </div>

              {/* The Window Target Area */}
              <div className="window-address-block pl-2 border-l-2 border-[#c27e42]">
                <p className="text-[8px] uppercase tracking-widest text-gray-400 font-bold mb-1">To:</p>
                <h3 className="font-serif font-bold text-[14px] text-[#1a1a1a] mb-[2px]">{formData.clientName}</h3>
                {formData.role && <p className="text-[10px] text-[#c27e42] font-medium mb-1">{formData.role}</p>}
                <p className="font-mono text-[10px] text-gray-600 leading-[1.3]">
                  {formData.addressLine1}<br/>
                  {formData.addressLine2 && <>{formData.addressLine2}<br/></>}
                  {formData.cityStateZip}<br/>
                  {formData.country}
                </p>
                <div className="mt-1 flex gap-2 text-[8px] font-mono text-gray-500">
                  {formData.mobile && <span>Ph: {formData.mobile}</span>}
                </div>
              </div>


              {/* PANEL 2: WELCOME & CARD MOUNT (99mm - 198mm) */}
              <div className="absolute top-[105mm] left-[20mm] right-[20mm]">
                <div className="flex justify-between items-end border-b border-gray-200 pb-2 mb-6">
                  <p className="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Date: {today}</p>
                  <p className="text-[10px] font-mono text-[#c27e42] uppercase tracking-widest">Ref: {formData.refId}</p>
                </div>
                <h1 className="font-serif text-[24px] text-[#111] leading-tight mb-4">Welcome to your new infrastructure, {firstName}.</h1>
                <p className="text-[12px] text-gray-700 leading-relaxed font-light text-justify">
                  Enclosed is your engineered digital identity card. This physical asset is permanently mapped to your dynamic portfolio architecture. We have verified your custom domain, secured your endpoints, and deployed your metrics to the global CDN.
                </p>
              </div>

              {/* The PVC Card Mount Outline */}
              <div className="card-mount">
                <i className="fa-solid fa-arrows-to-dot text-[#c27e42] text-xl mb-2 opacity-70"></i>
                <span className="text-[9px] font-bold uppercase tracking-widest text-[#c27e42] opacity-80">Mount Card Here</span>
                <span className="text-[7px] font-mono text-[#c27e42] mt-1 opacity-50">(Apply Fugitive Glue Dot)</span>
              </div>


              {/* PANEL 3: INSTRUCTIONS & SIGN-OFF (198mm - 297mm) */}
              <div className="absolute top-[205mm] left-[20mm] right-[20mm]">
                <h3 className="text-[11px] font-bold uppercase tracking-widest text-[#111] mb-4">Deployment Instructions</h3>
                
                <div className="space-y-4 mb-8">
                  <div className="flex gap-3 items-start">
                    <div className="w-5 h-5 rounded-full border border-[#c27e42] text-[#c27e42] flex items-center justify-center text-[10px] font-bold shrink-0">1</div>
                    <p className="text-[11px] text-gray-600 leading-relaxed"><strong>Detach the Asset.</strong> Peel the PVC card from this letter. The fugitive glue dot will remove cleanly from the matte finish without leaving residue.</p>
                  </div>
                  <div className="flex gap-3 items-start">
                    <div className="w-5 h-5 rounded-full border border-[#c27e42] text-[#c27e42] flex items-center justify-center text-[10px] font-bold shrink-0">2</div>
                    <p className="text-[11px] text-gray-600 leading-relaxed"><strong>Instant Operation.</strong> Your card is fully active. Allow clients to scan the permanent QR code using any standard smartphone camera to instantly route them to your digital infrastructure.</p>
                  </div>
                  <div className="flex gap-3 items-start">
                    <div className="w-5 h-5 rounded-full border border-[#c27e42] text-[#c27e42] flex items-center justify-center text-[10px] font-bold shrink-0">3</div>
                    <p className="text-[11px] text-gray-600 leading-relaxed"><strong>Cloud Modifications.</strong> To update your architecture, impact metrics, or contact vectors, submit a request via the portal. Your physical card requires zero configuration—it automatically routes to your latest deployment.</p>
                  </div>
                </div>

                {/* Sign-off */}
                <div className="flex justify-between items-end pt-4 border-t border-gray-200">
                  <div>
                    <p className="font-serif italic text-[16px] text-[#111] mb-1">The Engineering Team</p>
                    <p className="text-[9px] text-gray-500 font-mono uppercase tracking-widest">Footprint Forge, Chennai</p>
                  </div>
                  
                  {/* Watermark / Seal Area with Dynamic Logo */}
                  <div className="flex items-center gap-2 opacity-30">
                    <div className="w-[12mm] h-[12mm] rounded-full overflow-hidden grayscale mix-blend-multiply border border-gray-400">
                      <img src={logoUrl} alt="Seal" className="w-full h-full object-cover" onError={(e) => { e.target.style.display='none'; }} />
                    </div>
                    <span className="text-[8px] uppercase tracking-widest font-mono text-[#c27e42] font-bold">QA Passed</span>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LetterGenerator />);
  </script>
</body>
</html>
