<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Footprint Forge | Command Center</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Inter', sans-serif;
      margin: 0;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }
    .font-serif { font-family: 'Playfair Display', serif; }
    .copper-text { color: #c27e42; }
    .bg-copper { background-color: #c27e42; }
    .border-copper { border-color: #c27e42; }
    .foil-text {
      background: linear-gradient(135deg, #e6b981 0%, #c27e42 50%, #8a5a2e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .foil-bg { background: linear-gradient(135deg, #e6b981 0%, #c27e42 50%, #8a5a2e 100%); }
    .a4-paper {
      width: 210mm;
      height: 297mm;
      background-color: #ffffff;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0,0,0,0.05);
      position: relative;
      box-sizing: border-box;
    }
    .a4-letter { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E"); }
    .window-address-block { position: absolute; top: 62mm; left: 18mm; width: 85mm; height: 31mm; display: flex; flex-direction: column; justify-content: center; }
    .fold-guide { position: absolute; left: 0; width: 100%; border-top: 1px dashed rgba(0,0,0,0.1); z-index: 50; }
    .fold-1 { top: 99mm; }
    .fold-2 { top: 198mm; }
    .fold-tick { position: absolute; width: 3mm; border-top: 0.5px solid rgba(0,0,0,0.3); }
    .tick-left { left: 0; }
    .tick-right { right: 0; }
    .card-mount { position: absolute; top: 142mm; left: 50%; transform: translateX(-50%); width: 82mm; height: 50mm; border: 1.5px dashed #c27e42; border-radius: 4mm; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(194, 126, 66, 0.03); }

    @media print {
      body { background-color: transparent !important; margin: 0; }
      .no-print { display: none !important; }
      .a4-paper { margin: 0 !important; box-shadow: none !important; border: none !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .a4-letter { background-image: none !important; }
      .fold-guide { border-color: transparent !important; }
      .print-env-panel { background-color: #1A1A1A !important; border-color: transparent !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .foil-text { background: none !important; -webkit-text-fill-color: #C27A3E !important; color: #C27A3E !important; }
      .foil-bg { background: #C27A3E !important; }
      .env-white-text { color: #FFFFFF !important; }
    }
  </style>
</head>
<body>
  <div id="root" class="w-full min-h-screen"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
        apiKey: "AIzaSyBw9rKxbnZL9IDV7uy-BEW8Cq5aXvbUHpc",
        authDomain: "footprint-forge-f4c95.firebaseapp.com",
        projectId: "footprint-forge-f4c95"
    };

    let app, auth, db;
    try {
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
    } catch (e) {
        console.error("Firebase init failed:", e);
    }

    const PREDEFINED_PRODUCTS = [
      { name: "The Executive Portfolio", rate: 1499, discount: 500 },
      { name: "The Authority Portfolio", rate: 2499, discount: 1000 },
      { name: "The Institution Portfolio", rate: 5999, discount: 2500 },
      { name: "Extra Premium PVC QR Card", rate: 499, discount: 0 },
      { name: "Premium PVC QR Card (Standard Issue)", rate: 0, discount: 0 }
    ];

    function CommandCenter() {
      const [user, setUser] = useState(null);
      const [savedInvoices, setSavedInvoices] = useState([]);
      const [isSaving, setIsSaving] = useState(false);

      const [activeView, setActiveView] = useState('dashboard'); 
      const [activeTool, setActiveTool] = useState('invoice'); 
      const [activeTabMobile, setActiveTabMobile] = useState('edit');
      const [scale, setScale] = useState(1);
      const previewContainerRef = useRef(null);
      const [logoUrl, setLogoUrl] = useState("1000441850.png");

      const todayString = new Date().toISOString().split('T')[0];

      const [formData, setFormData] = useState({
        id: "",
        clientName: "",
        role: "Director, Commercial Banking",
        addressLine1: "",
        addressLine2: "",
        cityStateZip: "",
        country: "India",
        mobile: "",
        email: "",
        refId: "",
        invoiceNo: "",
        date: todayString,
        dueDate: todayString,
        billingMode: "advance",
        notes: "Thank you for partnering with Footprint Forge. A 50% non-refundable advance deposit is required before engineering commences. Please process payment via NEFT/RTGS to HDFC Bank A/c: 50100XXXXXXXXX, IFSC: HDFC0001234."
      });

      const [invoiceItems, setInvoiceItems] = useState([
        { id: 1, desc: "The Authority Portfolio", qty: 1, rate: 2499, discount: 1000 },
        { id: 2, desc: "Premium PVC QR Card (Standard Issue)", qty: 1, rate: 0, discount: 0 }
      ]);

      // Connect to the shared ff_agency_data collection
      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth); 
          } catch(e) { console.error("Auth init error:", e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const invoicesRef = collection(db, 'ff_agency_data');
        const unsubscribe = onSnapshot(invoicesRef, (snapshot) => {
          const invData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          invData.sort((a, b) => b.timestamp - a.timestamp);
          setSavedInvoices(invData);
        }, (err) => console.error("Firestore error:", err));
        
        return () => unsubscribe();
      }, [user]);

      // Auto-Serialization Generator
      useEffect(() => {
        const d = new Date();
        const prefix = `FF-${String(d.getFullYear()).slice(-2)}${String(d.getMonth() + 1).padStart(2, '0')}-`;
        
        let maxNum = 0;
        savedInvoices.forEach(inv => {
          if (inv.invoiceNo && inv.invoiceNo.startsWith(prefix)) {
            const parts = inv.invoiceNo.split('-');
            if (parts.length === 3) {
              const num = parseInt(parts[2], 10);
              if (!isNaN(num) && num > maxNum) maxNum = num;
            }
          }
        });
        
        const nextInvoiceNo = `${prefix}${String(maxNum + 1).padStart(3, '0')}`;
        
        if (!formData.invoiceNo || !formData.invoiceNo.startsWith(prefix)) {
            setFormData(prev => ({...prev, invoiceNo: nextInvoiceNo}));
        }
      }, [savedInvoices, formData.invoiceNo]);

      const updateData = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));
      const handleNameChange = (e) => {
        const name = e.target.value;
        const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        const ref = `${initials || 'XX'}-${Math.floor(1000 + Math.random() * 9000)}`;
        setFormData(prev => ({ ...prev, clientName: name, refId: ref }));
      };

      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => setLogoUrl(e.target.result);
          reader.readAsDataURL(file);
        }
      };

      const handlePrint = () => window.print();

      const calculateBaseTotal = () => {
        const subtotal = invoiceItems.reduce((sum, item) => sum + (Number(item.qty) * Number(item.rate)), 0);
        return subtotal - invoiceItems.reduce((sum, item) => sum + (Number(item.qty) * Number(item.discount || 0)), 0);
      };

      const handleSaveAndPrint = async () => {
        setIsSaving(true);
        const baseTotal = calculateBaseTotal();
        let amountDue = formData.billingMode === 'standard' ? baseTotal : baseTotal / 2;

        const updatedData = {
           invoiceNo: formData.invoiceNo,
           clientName: formData.clientName,
           email: formData.email,
           mobile: formData.mobile,
           role: formData.role,
           addressLine1: formData.addressLine1,
           addressLine2: formData.addressLine2,
           cityStateZip: formData.cityStateZip,
           country: formData.country,
           date: formData.date,
           total: amountDue,
           billingMode: formData.billingMode,
           paymentStatus: formData.paymentStatus === 'New Lead' ? 'Pending' : formData.paymentStatus || 'Pending',
           deliveryStatus: formData.deliveryStatus || 'Processing',
           timestamp: Date.now()
        };
        
        try {
           if (formData.id) {
               await updateDoc(doc(db, 'ff_agency_data', formData.id), updatedData);
           } else {
               await addDoc(collection(db, 'ff_agency_data'), updatedData);
           }
        } catch(e) { console.error("Cloud Save Failed:", e); }

        setIsSaving(false);
        setTimeout(() => window.print(), 100);
      };

      const loadClientToGenerator = (inv) => {
        let matchedProduct = PREDEFINED_PRODUCTS[1]; 
        if (inv.tierRequested && inv.tierRequested.includes("Executive")) matchedProduct = PREDEFINED_PRODUCTS[0];
        if (inv.tierRequested && inv.tierRequested.includes("Institution")) matchedProduct = PREDEFINED_PRODUCTS[2];

        setInvoiceItems([
           { id: 1, desc: matchedProduct.name, qty: 1, rate: matchedProduct.rate, discount: matchedProduct.discount },
           { id: 2, desc: "Premium PVC QR Card (Standard Issue)", qty: 1, rate: 0, discount: 0 }
        ]);

        const initials = (inv.clientName || 'XX').split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        
        setFormData(prev => ({
          ...prev,
          id: inv.id,
          clientName: inv.clientName || "",
          role: inv.role || "",
          email: inv.email || "",
          mobile: inv.mobile || "",
          addressLine1: inv.addressLine1 || "",
          addressLine2: inv.addressLine2 || "",
          cityStateZip: inv.cityStateZip || "",
          refId: `${initials}-${Math.floor(1000 + Math.random() * 9000)}`,
          paymentStatus: 'Pending', 
          billingMode: 'advance'
        }));
        
        setActiveView('generator');
        setActiveTool('invoice');
      };

      const updatePaymentStatus = async (inv, newStatus) => {
          if(!user || !db) return;
          try { 
              await updateDoc(doc(db, 'ff_agency_data', inv.id), { paymentStatus: newStatus, status: newStatus }); 
          } catch(e) { console.error("Failed to update payment status:", e); }
      };

      const updateDeliveryStatus = async (inv, newStatus) => {
          if(!user || !db) return;
          try { 
              await updateDoc(doc(db, 'ff_agency_data', inv.id), { deliveryStatus: newStatus }); 
          } catch(e) { console.error("Failed to update delivery status:", e); }
      };

      const rejectLead = async (inv) => {
          if(!user || !db) return;
          if(!window.confirm("Are you sure you want to reject this application?")) return;
          try {
             await updateDoc(doc(db, 'ff_agency_data', inv.id), { paymentStatus: 'Rejected', deliveryStatus: 'Cancelled', status: 'Rejected' });
          } catch(e) { console.error("Failed to reject lead:", e); }
      };

      const toggleCancelInvoice = async (inv) => {
          if(!user || !db) return;
          const pStatus = inv.paymentStatus || inv.status;
          try {
             const docRef = doc(db, 'ff_agency_data', inv.id);
             if (pStatus === 'Cancelled' || pStatus === 'Rejected') {
                 const restoreStatus = pStatus === 'Rejected' ? 'New Lead' : 'Pending';
                 await updateDoc(docRef, { paymentStatus: restoreStatus, deliveryStatus: 'Processing', status: restoreStatus });
             } else {
                 await updateDoc(docRef, { paymentStatus: 'Cancelled', deliveryStatus: 'Cancelled', status: 'Cancelled' });
             }
          } catch(e) { console.error("Failed to toggle cancel state:", e); }
      };

      const exportToExcel = () => {
        if (savedInvoices.length === 0) return alert("No data available to export");
        const headers = ["Invoice No", "Date", "Client Name", "Email", "Mobile", "Billing Type", "Amount (INR)", "Payment Status", "Delivery Status"];
        const rows = savedInvoices.map(inv => [
            inv.invoiceNo || 'N/A', inv.date, `"${inv.clientName || ''}"`, `"${inv.email || ''}"`, `"${inv.mobile || ''}"`,
            inv.billingMode === 'advance' ? '50% Advance' : inv.billingMode === 'final' ? '50% Final' : 'Standard',
            inv.total || 0, inv.paymentStatus, inv.deliveryStatus || 'Processing'
        ]);
        const csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `FootprintForge_CRM_${todayString}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const formatCurrency = (num) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 2 }).format(num || 0);

      useEffect(() => {
        const handleResize = () => {
          if (previewContainerRef.current && activeView === 'generator') {
            const w = previewContainerRef.current.clientWidth;
            const target = activeTool === 'envelope' ? 1020 : 794; 
            const pad = activeTool === 'envelope' ? 40 : 32; 
            setScale(w < target + pad ? (w - pad) / target : 1);
          }
        };
        handleResize();
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [activeView, activeTool, activeTabMobile]);

      const renderSidebarContent = () => {
        if (activeView === 'dashboard') return null;

        return (
          <div className={`no-print w-full lg:w-[450px] bg-white border-r border-gray-200 p-6 flex-col min-h-screen overflow-y-auto shadow-xl z-10 shrink-0 pb-28 lg:pb-6 ${activeTabMobile === 'edit' ? 'flex' : 'hidden lg:flex'}`}>
            <div className="flex justify-between items-center mb-6">
               <div className="flex items-center gap-3">
                 <div className="w-10 h-10 rounded-full bg-black flex items-center justify-center border border-[#c27e42]">
                   <i className="fa-solid fa-fingerprint text-[#c27e42]"></i>
                 </div>
                 <div>
                   <h1 className="text-sm font-bold tracking-widest uppercase">Command Center</h1>
                   <p className="text-xs text-gray-500 font-mono">Agency Operations</p>
                 </div>
               </div>
               <button onClick={() => { setActiveView('dashboard'); setFormData({...formData, id: ''}); }} className="text-[#c27e42] hover:bg-[#c27e42]/10 p-2 rounded-lg transition-colors flex flex-col items-center group">
                  <i className="fa-solid fa-chart-line text-lg mb-1 group-hover:scale-110 transition-transform"></i>
                  <span className="text-[8px] uppercase tracking-widest font-bold">Dashboard</span>
               </button>
            </div>

            <div className="space-y-6 flex-1">
              <div className="flex bg-gray-100 p-1 rounded-lg gap-1 border border-gray-200">
                <button onClick={() => setActiveTool('invoice')} className={`flex-1 py-2 text-[10px] sm:text-xs font-bold uppercase tracking-wider rounded-md transition-colors ${activeTool === 'invoice' ? 'bg-white shadow text-[#c27e42]' : 'text-gray-500 hover:text-gray-800'}`}>Invoice</button>
                <button onClick={() => setActiveTool('letter')} className={`flex-1 py-2 text-[10px] sm:text-xs font-bold uppercase tracking-wider rounded-md transition-colors ${activeTool === 'letter' ? 'bg-white shadow text-[#c27e42]' : 'text-gray-500 hover:text-gray-800'}`}>Letter</button>
                <button onClick={() => setActiveTool('envelope')} className={`flex-1 py-2 text-[10px] sm:text-xs font-bold uppercase tracking-wider rounded-md transition-colors ${activeTool === 'envelope' ? 'bg-white shadow text-[#c27e42]' : 'text-gray-500 hover:text-gray-800'}`}>Envelope</button>
              </div>

              <div className="space-y-3">
                <div className="flex justify-between items-end">
                  <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide">Global Client Data</label>
                </div>
                <input type="text" placeholder="Client / Company Name" value={formData.clientName} onChange={handleNameChange} className="w-full text-sm p-2.5 border border-gray-300 rounded font-bold outline-none focus:border-[#c27e42] focus:ring-1 focus:ring-[#c27e42]" />
                
                {activeTool === 'letter' && <input type="text" placeholder="Role / Title" value={formData.role} onChange={(e) => updateData('role', e.target.value)} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />}
                
                <div className="grid grid-cols-1 gap-2 pt-1 border-t border-gray-100">
                  <input type="text" placeholder="Address Line 1" value={formData.addressLine1} onChange={(e) => updateData('addressLine1', e.target.value)} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  <input type="text" placeholder="Address Line 2 (Optional)" value={formData.addressLine2} onChange={(e) => updateData('addressLine2', e.target.value)} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  <div className="grid grid-cols-2 gap-2">
                    <input type="text" placeholder="City, State Zip" value={formData.cityStateZip} onChange={(e) => updateData('cityStateZip', e.target.value)} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                    <input type="text" placeholder="Country" value={formData.country} onChange={(e) => updateData('country', e.target.value)} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <input type="text" placeholder="Mobile" value={formData.mobile} onChange={(e) => updateData('mobile', e.target.value)} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                    <input type="email" placeholder="Email" value={formData.email} onChange={(e) => updateData('email', e.target.value)} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none" />
                  </div>
                </div>
              </div>

              {activeTool === 'invoice' && (
                <div className="space-y-4 pt-4 border-t border-gray-200">
                  <div className="bg-[#c27e42]/10 border border-[#c27e42]/30 p-3 rounded-lg">
                     <label className="block text-[10px] font-bold text-[#c27e42] uppercase tracking-wide mb-2">Billing Mode (Payment Structure)</label>
                     <select value={formData.billingMode} onChange={(e) => updateData('billingMode', e.target.value)} className="w-full text-sm p-2 border border-[#c27e42]/50 bg-white rounded outline-none font-medium">
                        <option value="standard">100% Upfront (Standard)</option>
                        <option value="advance">50% Advance Request</option>
                        <option value="final">50% Final Settlement</option>
                     </select>
                  </div>

                  <div className="grid grid-cols-3 gap-3">
                    <div>
                      <label className="block text-[10px] font-bold text-gray-700 uppercase tracking-wide mb-1">Invoice No.</label>
                      <input type="text" value={formData.invoiceNo} onChange={(e) => updateData('invoiceNo', e.target.value)} className="w-full text-sm p-2 border border-gray-300 rounded outline-none font-mono" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold text-gray-700 uppercase tracking-wide mb-1">Issue Date</label>
                      <input type="date" value={formData.date} onChange={(e) => updateData('date', e.target.value)} className="w-full text-sm p-2 border border-gray-300 rounded outline-none" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold text-gray-700 uppercase tracking-wide mb-1">Due Date</label>
                      <input type="date" value={formData.dueDate} onChange={(e) => updateData('dueDate', e.target.value)} className="w-full text-sm p-2 border border-gray-300 rounded outline-none" />
                    </div>
                  </div>

                  <div>
                    <div className="flex justify-between items-center mb-3">
                      <label className="block text-xs font-bold text-[#c27e42] uppercase tracking-wide">Line Items</label>
                      <button onClick={() => setInvoiceItems([...invoiceItems, { id: Date.now(), desc: "Custom Line Item", qty: 1, rate: 0, discount: 0 }])} className="text-[10px] bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-1 px-2 rounded transition-colors uppercase tracking-widest">+ Add Item</button>
                    </div>
                    
                    <div className="space-y-4">
                      {invoiceItems.map((item) => {
                        const isPredefined = PREDEFINED_PRODUCTS.some(p => p.name === item.desc);
                        return (
                          <div key={item.id} className="bg-gray-50 border border-gray-200 p-3 rounded-lg flex flex-col gap-2 relative group">
                            {invoiceItems.length > 1 && <button onClick={() => setInvoiceItems(invoiceItems.filter(i => i.id !== item.id))} className="absolute -top-2 -right-2 w-5 h-5 bg-red-100 hover:bg-red-500 hover:text-white text-red-500 rounded-full flex items-center justify-center text-[10px] transition-colors border border-red-200 z-10"><i className="fa-solid fa-xmark"></i></button>}
                            <select 
                              value={isPredefined ? item.desc : "Custom Line Item"}
                              onChange={(e) => {
                                const selectedName = e.target.value;
                                if (selectedName === "Custom Line Item") {
                                  setInvoiceItems(invoiceItems.map(i => i.id === item.id ? { ...i, desc: "" } : i));
                                } else {
                                  const prod = PREDEFINED_PRODUCTS.find(p => p.name === selectedName);
                                  setInvoiceItems(invoiceItems.map(i => i.id === item.id ? { ...i, desc: prod.name, rate: prod.rate, discount: prod.discount } : i));
                                }
                              }}
                              className="w-full text-xs p-2 border border-gray-300 rounded outline-none bg-white font-medium text-gray-800"
                            >
                              <option value="Custom Line Item">Custom Line Item</option>
                              {PREDEFINED_PRODUCTS.map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
                            </select>
                            {!isPredefined && <input type="text" placeholder="Custom Description" value={item.desc} onChange={(e) => setInvoiceItems(invoiceItems.map(i => i.id === item.id ? { ...i, desc: e.target.value } : i))} className="w-full text-xs p-2 border border-gray-300 rounded outline-none" />}
                            <div className="flex gap-2 mt-1">

                <img src={logoUrl} alt="Logo" className="w-full h-full object-cover bg-[#05080f]" onError={(e) => { e.target.style.display='none'; }} />
              </div>
            </div>

            <div className="window-address-block pl-2 border-l-2 border-[#c27e42]">
              <p className="text-[8px] uppercase tracking-widest text-gray-400 font-bold mb-1">To:</p>
              <h3 className="font-serif font-bold text-[14px] text-[#1a1a1a] mb-[2px]">{formData.clientName}</h3>
              {formData.role && <p className="text-[10px] text-[#c27e42] font-medium mb-1">{formData.role}</p>}
              <p className="font-mono text-[10px] text-gray-600 leading-[1.3]">{formData.addressLine1}<br/>{formData.addressLine2 && <>{formData.addressLine2}<br/></>}{formData.cityStateZip}<br/>{formData.country}</p>
              <div className="mt-1 flex gap-2 text-[8px] font-mono text-gray-500">{formData.mobile && <span>Ph: {formData.mobile}</span>}</div>
            </div>

            <div className="absolute top-[102mm] left-[20mm] right-[20mm]">
              <div className="flex justify-between items-end border-b border-gray-200 pb-2 mb-3">
                <p className="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Date: {formatD(formData.date)}</p>
                <p className="text-[10px] font-mono text-[#c27e42] uppercase tracking-widest">Ref: {formData.refId}</p>
              </div>
              <h1 className="font-serif text-[22px] text-[#111] leading-tight mb-2">Welcome to your new infrastructure, {firstName}.</h1>
              <p className="text-[11px] text-gray-700 leading-relaxed font-light text-justify">Enclosed is your engineered digital identity card. This physical asset is permanently mapped to your dynamic portfolio architecture. Your identity hub has been successfully deployed across GitHub's global edge infrastructure, ensuring permanent uptime, SSL security, and instant global access.</p>
            </div>

            <div className="card-mount">
              <i className="fa-solid fa-arrows-to-dot text-[#c27e42] text-xl mb-2 opacity-70"></i>
              <span className="text-[9px] font-bold uppercase tracking-widest text-[#c27e42] opacity-80">Mount Card Here</span>
              <span className="text-[7px] font-mono text-[#c27e42] mt-1 opacity-50">(Apply Fugitive Glue Dot)</span>
            </div>

            <div className="absolute top-[205mm] left-[20mm] right-[20mm]">
              <h3 className="text-[11px] font-bold uppercase tracking-widest text-[#111] mb-4">Deployment Instructions</h3>
              <div className="space-y-4 mb-8">
                <div className="flex gap-3 items-start"><div className="w-5 h-5 rounded-full border border-[#c27e42] text-[#c27e42] flex items-center justify-center text-[10px] font-bold shrink-0">1</div><p className="text-[11px] text-gray-600 leading-relaxed"><strong>Detach the Asset.</strong> Peel the premium PVC card from this letter. The fugitive glue dot will remove cleanly without leaving residue.</p></div>

                <div className="flex gap-3 items-start"><div className="w-5 h-5 rounded-full border border-[#c27e42] text-[#c27e42] flex items-center justify-center text-[10px] font-bold shrink-0">3</div><p className="text-[11px] text-gray-600 leading-relaxed"><strong>Cloud Modifications.</strong> To update your architecture, impact metrics, or contact vectors, submit a request via the portal. Your physical card requires zero configuration—it automatically routes to your latest deployment.</p></div>
              </div>
              <div className="flex justify-between items-end pt-4 border-t border-gray-200">
                <div><p className="font-serif italic text-[16px] text-[#111] mb-1">The Engineering Team</p><p className="text-[9px] text-gray-500 font-mono uppercase tracking-widest">Footprint Forge, Chennai</p></div>

              </div>
            </div>
          </div>
        );
      };

      const renderEnvelopePreview = () => {

            <div className="relative w-full h-full">
              <div className="absolute top-[0mm] left-[25mm] w-[220mm] h-[45mm] bg-[#111] print-env-panel" style={{clipPath: 'polygon(15mm 0, calc(100% - 15mm) 0, 100% 100%, 0 100%)'}}>
                <div className="absolute top-[6mm] left-[101mm] transform rotate-180 w-[18mm] h-[18mm] rounded-full foil-bg p-[0.5mm] shadow-[0_0_10px_rgba(194,126,66,0.3)] print:shadow-none"><div className="w-full h-full bg-[#0a0a0a] rounded-full flex flex-col items-center justify-center border border-[#111]"><i className="fa-solid fa-fingerprint foil-text text-[6mm] mb-[0.5mm]"></i><span className="text-[1.8mm] uppercase tracking-[0.2em] foil-text font-bold leading-none">Secured</span></div></div>
              </div>
              <div className="absolute top-[45mm] left-[25mm] w-[220mm] h-[5mm] bg-[#1a1a1a] print-env-panel border-x border-t border-dashed border-[#c27e42]/50 flex items-center justify-center"><span className="text-[2mm] text-[#c27e42] opacity-60 tracking-[0.5em] uppercase font-mono no-print">5mm Gusset</span></div>
              <div className="absolute top-[160mm] left-[25mm] w-[220mm] h-[5mm] bg-[#1a1a1a] print-env-panel border-x border-b border-dashed border-[#c27e42]/50 flex items-center justify-center"><span className="text-[2mm] text-[#c27e42] opacity-60 tracking-[0.5em] uppercase font-mono no-print">5mm Gusset</span></div>
              <div className="absolute top-[50mm] left-[20mm] w-[5mm] h-[110mm] bg-[#1a1a1a] print-env-panel border-y border-l border-dashed border-[#c27e42]/50 flex items-center justify-center"><span className="transform -rotate-90 text-[2mm] text-[#c27e42] opacity-60 tracking-[0.5em] uppercase font-mono whitespace-nowrap no-print">5mm Gusset</span></div>
              <div className="absolute top-[50mm] left-[245mm] w-[5mm] h-[110mm] bg-[#1a1a1a] print-env-panel border-y border-r border-dashed border-[#c27e42]/50 flex items-center justify-center"><span className="transform rotate-90 text-[2mm] text-[#c27e42] opacity-60 tracking-[0.5em] uppercase font-mono whitespace-nowrap no-print">5mm Gusset</span></div>
              <div className="absolute top-[160mm] left-[20mm] w-[5mm] h-[5mm] bg-[#0a0a0a] print-env-panel border border-[#c27e42]/80 group"><span className="absolute -left-12 top-1 opacity-0 group-hover:opacity-100 text-[8px] text-[#c27e42] no-print transition-opacity">Corner Tab</span></div>
              <div className="absolute top-[160mm] left-[245mm] w-[5mm] h-[5mm] bg-[#0a0a0a] print-env-panel border border-[#c27e42]/80 group"></div>
              <div className="absolute top-[55mm] left-[0mm] w-[20mm] h-[100mm] bg-[#080808] print-env-panel border border-dashed border-[#c27e42]/70 flex items-center justify-center" style={{clipPath: 'polygon(0 5mm, 100% 0, 100% 100%, 0 calc(100% - 5mm))'}}><span className="transform -rotate-90 text-[3.5mm] text-[#c27e42] font-bold uppercase tracking-widest whitespace-nowrap no-print">Apply Glue</span></div>
              <div className="absolute top-[55mm] left-[250mm] w-[20mm] h-[100mm] bg-[#080808] print-env-panel border border-dashed border-[#c27e42]/70 flex items-center justify-center" style={{clipPath: 'polygon(0 0, 100% 5mm, 100% calc(100% - 5mm), 0 100%)'}}><span className="transform rotate-90 text-[3.5mm] text-[#c27e42] font-bold uppercase tracking-widest whitespace-nowrap no-print">Apply Glue</span></div>

              <div className="absolute top-[50mm] left-[25mm] w-[220mm] h-[110mm] bg-[#111] print-env-panel p-[10mm]">
                <div className="flex justify-between items-start">
                  <div className="flex gap-3">
                    <div className="w-[12mm] h-[12mm] rounded-full border border-[#c27e42] flex items-center justify-center bg-[#05080f] overflow-hidden shrink-0 mt-1"><img src={logoUrl} alt="FF" className="w-full h-full object-cover bg-[#05080f]" onError={(e) => { e.target.style.display='none'; }} /></div>
                    <div><h2 className="text-[3.5mm] font-bold tracking-[0.2em] text-white uppercase mb-[1mm] leading-none">Footprint Forge</h2><p className="text-[2.2mm] text-gray-400 font-mono leading-[1.4] tracking-wide uppercase">362, L Block, West Cementry Road<br/>Oldwashermenpet, Chennai-600021<br/>Mob: +919952041493<br/>footprintforge-hq.github.io</p></div>
                  </div>
                  <div className="border border-[#c27e42] px-[2mm] py-[1mm] rounded flex items-center gap-[1mm]"><i className="fa-solid fa-plane-departure text-[#c27e42] text-[2.5mm]"></i><span className="text-[#c27e42] text-[2mm] font-bold tracking-widest uppercase">Priority</span></div>
                </div>

                <div className="absolute bottom-[12mm] left-[15mm] z-10 w-[90mm]">
                  <p className="text-[2.5mm] uppercase tracking-widest text-[#c27e42] font-bold mb-[1mm]">Deliver To:</p>
                  <h3 className="font-serif font-bold text-[5.5mm] text-white mb-[1mm] leading-tight">{formData.clientName}</h3>
                  <p className="font-mono text-[3mm] text-gray-300 leading-[1.4]">{formData.addressLine1}<br/>{formData.addressLine2 && <>{formData.addressLine2}<br/></>}{formData.cityStateZip}<br/>{formData.country}</p>
                  <div className="mt-[2mm] text-[2.5mm] font-mono text-[#c27e42] font-semibold tracking-wide">{formData.mobile && <span><i className="fa-solid fa-phone text-[2mm] mr-1"></i> {formData.mobile}</span>}</div>
                </div>
                <div className="absolute bottom-[10mm] right-[10mm] text-right flex flex-col items-end gap-1"><span className="text-[2.8mm] font-bold tracking-[0.3em] env-white-text uppercase border border-white px-[2mm] py-[0.5mm] rounded">Do Not Bend</span><span className="text-[2.2mm] font-mono font-semibold env-white-text uppercase">Contents: Digital Infrastructure</span></div>
              </div>

              <div className="absolute top-[165mm] left-[25mm] w-[220mm] h-[110mm] bg-[#111] print-env-panel" style={{clipPath: 'polygon(0 0, 100% 0, calc(100% - 10mm) 100%, 10mm 100%)'}}>
                <div className="absolute top-[8mm] w-full text-center transform rotate-180"><h2 className="font-serif italic text-[5mm] foil-text mb-[1mm]">Identity Infrastructure.</h2><p className="text-[2.2mm] font-bold uppercase tracking-[0.3em] env-white-text">Engineered in Chennai</p><p className="text-[1.8mm] font-semibold uppercase tracking-[0.2em] env-white-text mt-[1mm]">MSME: UDYAM-TN-02-0455866</p></div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="flex flex-col lg:flex-row w-full min-h-screen relative">
          <style>{`@media print { @page { size: ${activeTool === 'envelope' && activeView !== 'dashboard' ? 'A3' : 'A4'} portrait; margin: ${activeTool === 'envelope' && activeView !== 'dashboard' ? '10mm' : '0'}; } }`}</style>
          {renderSidebarContent()}

          <div ref={activeView !== 'dashboard' ? previewContainerRef : null} className={`flex-1 bg-gray-100 overflow-y-auto flex-col items-center pt-8 pb-28 lg:pb-10 print:!block print:!p-0 print:!bg-white ${activeTabMobile === 'preview' || activeView === 'dashboard' ? 'flex' : 'hidden lg:flex'}`}>
            {activeView === 'dashboard' ? renderDashboard() : (
              <div style={{ transform: `scale(${scale})`, transformOrigin: 'top center', marginBottom: scale < 1 ? `-${(activeTool === 'envelope' ? 275 : 297) * (1 - scale)}mm` : '0' }} className="print:!transform-none print:!m-0 transition-transform duration-200">
                {activeTool === 'invoice' && renderInvoicePreview()}
                {activeTool === 'letter' && renderLetterPreview()}
                {activeTool === 'envelope' && renderEnvelopePreview()}
              </div>
            )}
          </div>

          {activeView !== 'dashboard' && (
            <div className="lg:hidden no-print fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 flex gap-3 z-50 shadow-[0_-4px_15px_rgba(0,0,0,0.05)]">
              {activeTabMobile === 'edit' ? (
                <button onClick={() => setActiveTabMobile('preview')} className="flex-1 bg-gray-900 hover:bg-black text-white py-3 rounded-lg font-bold tracking-wide transition-colors">Preview Document</button>
              ) : (
                <>
                  <button onClick={() => setActiveTabMobile('edit')} className="flex-1 border border-gray-300 text-gray-700 py-3 rounded-lg font-bold tracking-wide">Edit Details</button>
                  {activeTool === 'invoice' ? (
                    <button onClick={handleSaveAndPrint} disabled={isSaving} className="flex-1 bg-[#c27e42] text-white py-3 rounded-lg font-bold tracking-wide flex items-center justify-center gap-2 shadow-lg shadow-[#c27e42]/20 text-[10px] disabled:opacity-70">
                      {isSaving ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-cloud-arrow-up"></i>}
                      {isSaving ? "Saving..." : "Save & Print"}
                    </button>
                  ) : (
                    <button onClick={handlePrint} className="flex-1 bg-[#c27e42] text-white py-3 rounded-lg font-bold tracking-wide flex items-center justify-center gap-2 shadow-lg shadow-[#c27e42]/20"><i className="fa-solid fa-print"></i> Print</button>
                  )}
                </>
              )}
            </div>
          )}
          
          {activeView !== 'dashboard' && (
            <div className="hidden lg:block no-print fixed bottom-8 right-8 z-50">
              {activeTool === 'invoice' ? (
                 <button onClick={handleSaveAndPrint} disabled={isSaving} className="bg-[#c27e42] hover:bg-[#a66731] text-white font-bold uppercase tracking-wider py-4 px-8 rounded-full shadow-2xl transition-all flex justify-center items-center gap-3 hover:scale-105 group disabled:opacity-70 disabled:hover:scale-100">
                   <div className="flex flex-col items-center">
                     <span className="flex items-center gap-2">{isSaving ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-cloud-arrow-up"></i>} {isSaving ? "SAVING..." : "SAVE & PRINT"}</span>
                     <span className="text-[9px] text-white/70 tracking-widest -mt-1">Syncs to Dashboard</span>
                   </div>
                 </button>
              ) : (
                 <button onClick={handlePrint} className="bg-[#c27e42] hover:bg-[#a66731] text-white font-bold uppercase tracking-wider py-4 px-8 rounded-full shadow-2xl transition-all flex justify-center items-center gap-3 hover:scale-105">
                   <i className="fa-solid fa-print text-xl"></i> Print {activeTool}
                 </button>
              )}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CommandCenter />);
  </script>
</body>
</html>
