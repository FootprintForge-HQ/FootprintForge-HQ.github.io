<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Footprint Forge | Command Center v2</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    :root {
      --gold: #c27e42; --gold-l: #e6b981; --gold-dim: rgba(194,126,66,0.12);
      --bg: #07090f; --s1: #0d1117; --s2: #161b22; --s3: #21262d;
      --border: rgba(255,255,255,0.06); --border-h: rgba(255,255,255,0.12);
      --text: #e6edf3; --muted: #7d8590; --dim: #30363d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'Syne', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    .mono { font-family: 'DM Mono', monospace !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 4px; }

    /* Grid bg */
    .grid-bg { background-image: radial-gradient(var(--dim) 1px, transparent 1px); background-size: 24px 24px; }

    /* Animations */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    @keyframes spin     { to { transform:rotate(360deg); } }
    @keyframes slideIn  { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
    .fade-up  { animation: fadeUp  .35s ease forwards; }
    .fade-in  { animation: fadeIn  .25s ease forwards; }
    .slide-in { animation: slideIn .3s ease forwards; }
    .spin-anim { animation: spin .7s linear infinite; }
    .pulse-dot { animation: pulse 2s ease infinite; }

    /* Stage pill colors */
    .stage-new-lead       { background:rgba(139,92,246,.15); color:#a78bfa; border:1px solid rgba(139,92,246,.3); }
    .stage-advance-paid   { background:rgba(245,158,11,.15); color:#fbbf24; border:1px solid rgba(245,158,11,.3); }
    .stage-design-in-progress { background:rgba(59,130,246,.15); color:#60a5fa; border:1px solid rgba(59,130,246,.3); }
    .stage-design-approved{ background:rgba(16,185,129,.15); color:#34d399; border:1px solid rgba(16,185,129,.3); }
    .stage-printing       { background:rgba(251,146,60,.15); color:#fb923c; border:1px solid rgba(251,146,60,.3); }
    .stage-card-dispatched{ background:rgba(14,165,233,.15); color:#38bdf8; border:1px solid rgba(14,165,233,.3); }
    .stage-delivered      { background:rgba(34,197,94,.15); color:#4ade80; border:1px solid rgba(34,197,94,.3); }
    .stage-complete       { background:rgba(194,126,66,.15); color:#e6b981; border:1px solid rgba(194,126,66,.3); }

    /* Card hover */
    .card-hover { transition: border-color .2s, background .2s, transform .2s; }
    .card-hover:hover { border-color: var(--border-h) !important; background: var(--s2) !important; }

    /* Input */
    input, select, textarea {
      background: var(--s1); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 13px; border-radius: 8px; padding: 10px 12px;
      width: 100%; transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(194,126,66,.08);
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }

    /* Gold btn */
    .btn-gold {
      background: linear-gradient(135deg, var(--gold-l), var(--gold));
      color: #07090f; font-weight: 700; border: none; cursor: pointer;
      border-radius: 10px; padding: 10px 20px; font-family: 'Syne', sans-serif;
      font-size: 13px; letter-spacing: .03em; transition: opacity .15s, transform .15s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-gold:hover { opacity: .9; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; border-radius: 10px;
      padding: 10px 16px; font-family: 'Syne', sans-serif; font-size: 13px;
      transition: border-color .15s, color .15s, background .15s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-ghost:hover { border-color: var(--border-h); color: var(--text); background: var(--s2); }

    /* Timeline dot */
    .tl-dot { width:10px; height:10px; border-radius:50%; background:var(--gold); flex-shrink:0; margin-top:4px; box-shadow:0 0 6px rgba(194,126,66,.5); }
    .tl-line { width:1px; background:var(--border); flex:1; min-height:20px; margin:4px 0 4px 4.5px; }

    /* Modal backdrop */
    .modal-bg { position:fixed; inset:0; background:rgba(7,9,15,.85); backdrop-filter:blur(8px); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; }

    /* Print */
    @media print {
      @page { size: A4 portrait; margin: 0; }
      body { background: white !important; }
      .no-print { display: none !important; }
      .a4 { box-shadow: none !important; margin: 0 !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
    .a4 { width:210mm; min-height:297mm; background:#fff; box-shadow:0 20px 60px rgba(0,0,0,.6); position:relative; }
  </style>
</head>
<body>
<div id="root"></div>

<!-- Firebase loaded as plain ES module FIRST, stored on window -->
<script type="module">
  import { initializeApp }        from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc }
    from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const FB_CONFIG = {
    apiKey: "AIzaSyBw9rKxbnZL9IDV7uy-BEW8Cq5aXvbUHpc",
    authDomain: "footprint-forge-f4c95.firebaseapp.com",
    projectId: "footprint-forge-f4c95"
  };

  try {
    const app  = initializeApp(FB_CONFIG);
    window._ffAuth = getAuth(app);
    window._ffDb   = getFirestore(app);
    window._ffFns  = { signInWithEmailAndPassword, signOut, onAuthStateChanged,
                       collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc };
  } catch(e) { console.error("Firebase init:", e); }
</script>

<!-- React app in plain Babel (no data-type=module) -->
<script type="text/babel">
  const { useState, useEffect, useRef, useMemo, useCallback } = React;

  // Firebase helpers — read from window at call time (not parse time)
  // This ensures the ES module has finished before we access these
  const getAuth  = ()  => window._ffAuth;
  const getDb    = ()  => window._ffDb;
  const getFns   = ()  => window._ffFns || {};

  // Convenience destructure at call time
  const signInWithEmailAndPassword = (...a) => getFns().signInWithEmailAndPassword?.(...a);
  const signOut                    = (...a) => getFns().signOut?.(...a);
  const onAuthStateChanged         = (...a) => getFns().onAuthStateChanged?.(...a);
  const collection                 = (...a) => getFns().collection?.(...a);
  const onSnapshot                 = (...a) => getFns().onSnapshot?.(...a);
  const doc                        = (...a) => getFns().doc?.(...a);
  const addDoc                     = (...a) => getFns().addDoc?.(...a);
  const updateDoc                  = (...a) => getFns().updateDoc?.(...a);
  const deleteDoc                  = (...a) => getFns().deleteDoc?.(...a);

  /* ── Constants ── */
  const STAGES = [
    { id:"New Lead",            label:"New Lead",          icon:"fa-bolt",                cls:"stage-new-lead"         },
    { id:"Advance Paid",        label:"Advance Paid",      icon:"fa-money-bill-wave",     cls:"stage-advance-paid"     },
    { id:"Design in Progress",  label:"Design in Progress",icon:"fa-pen-ruler",           cls:"stage-design-in-progress"},
    { id:"Design Approved",     label:"Design Approved",   icon:"fa-circle-check",        cls:"stage-design-approved"  },
    { id:"Printing",            label:"Printing",          icon:"fa-print",               cls:"stage-printing"         },
    { id:"Card Dispatched",     label:"Card Dispatched",   icon:"fa-truck-fast",          cls:"stage-card-dispatched"  },
    { id:"Delivered",           label:"Delivered",         icon:"fa-box-open",            cls:"stage-delivered"        },
    { id:"Complete",            label:"Complete",          icon:"fa-star",                cls:"stage-complete"         },
  ];

  const TIERS = [
    { name:"The Executive",   price:999  },
    { name:"The Authority",   price:1499 },
    { name:"The Institution", price:3499 },
  ];

  const fmt = (n) => new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR',minimumFractionDigits:0}).format(n||0);
  const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
  const fmtTime = (d) => d ? new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';
  const tsToDate = (ts) => ts?.toDate ? ts.toDate() : ts ? new Date(ts) : null;
  const now = () => new Date().toISOString();
  const greet = () => { const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; };
  const stageClass = (s) => STAGES.find(x=>x.id===s)?.cls || 'stage-new-lead';
  const stageIcon  = (s) => STAGES.find(x=>x.id===s)?.icon || 'fa-bolt';
  const wa = (mobile, msg) => `https://wa.me/${(mobile||'').replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
  const mail = (email, subject, body) => `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

  /* ── WhatsApp Templates ── */
  const WA_TEMPLATES = {
    "New Lead":           (c) => `Hi ${c.firstName}! 👋 Thanks for your interest in Footprint Forge. I'm Yogaprabhu. Could you share a bit more about what you're looking for? We build premium PVC QR cards + bespoke portfolio websites starting at ₹999. 🔥`,
    "Advance Paid":       (c) => `Hi ${c.firstName}! ✅ Advance payment received — thank you! Your build is now confirmed.\n\nTo get started, please fill in your Portfolio Brief using this link:\n👉 https://footprintforge-hq.github.io/brief.html?id=${c.id||'YOUR_ID'}\n\nIt only takes 5–10 minutes and helps us build exactly what you need. Once submitted, we'll get right to work! 🚀`,
    "Design in Progress": (c) => `Hi ${c.firstName}! 🎨 Just wanted to let you know — your portfolio design is currently in progress. I'll share a preview link for your review once it's ready. Should be with you soon!`,
    "Design Approved":    (c) => `Hi ${c.firstName}! ✅ Your design is approved and locked in — brilliant! Your card is now heading to print. I'll keep you posted on the progress. 🖨️`,
    "Printing":           (c) => `Hi ${c.firstName}! 🖨️ Great news — your premium PVC card is currently being printed. Once it's in my hands, I'll send you a quick video before dispatch. Shouldn't be long now!`,
    "Card Dispatched":    (c) => `Hi ${c.firstName}! 📦 Your card has been dispatched!\n\nTracking: ${c.tracking||'[Add tracking ID]'}\nCourier: Delhivery\n\nYou should receive it in 5–7 working days. Feel free to reach out if you need anything! 🙌`,
    "Delivered":          (c) => `Hi ${c.firstName}! 📬 Just checking — did your card arrive safely? Hope you love it! Would be great to hear your thoughts once you've had a chance to use it. 😊`,
    "Complete":           (c) => `Hi ${c.firstName}! 🌟 Your Footprint Forge build is officially complete!\n\n🔗 Portfolio: ${c.portfolioUrl||'[Add URL]'}\n💳 Card: Delivered\n\nIf you ever need updates to your portfolio or more cards — just ping me. It was a pleasure building your infrastructure! 🔥`,
  };

  /* ── Email Templates ── */
  const EMAIL_TEMPLATES = {
    "New Lead": (c) => ({
      subject: `Your Footprint Forge enquiry — ${c.name}`,
      body: `Hi ${c.firstName},\n\nThank you for your interest in Footprint Forge! 🙏\n\nWe build premium PVC QR business cards connected to bespoke portfolio websites — hand-coded, permanently hosted, zero recurring fees.\n\nOur packages start at ₹999. I'd love to understand your requirements better and put together the right solution for you.\n\nCould you share a bit about your role and what you'd like on your portfolio?\n\nLooking forward to hearing from you.\n\nWarm regards,\nYogaprabhu S.\nFounder · Footprint Forge\n+91 99520 41493\nfootprintforge-hq.github.io`,
    }),
    "Advance Paid": (c) => ({
      subject: `Payment Confirmed — Let's Build Your Infrastructure, ${c.firstName}!`,
      body: `Hi ${c.firstName},\n\nYour advance payment has been received and your build is officially confirmed! 🎉\n\nHere's what happens next:\n\n1. I'll reach out to finalise your design requirements\n2. Portfolio design begins (3–5 working days)\n3. You'll receive a preview link for approval\n4. Once approved, your card goes to print\n\nIf you have any references, preferred colours, or specific content ready — feel free to reply to this email with those details.\n\nExcited to build this for you!\n\nWarm regards,\nYogaprabhu S.\nFounder · Footprint Forge\n+91 99520 41493`,
    }),
    "Card Dispatched": (c) => ({
      subject: `Your Footprint Forge Card is On Its Way! 📦`,
      body: `Hi ${c.firstName},\n\nExciting news — your premium PVC card has been dispatched!\n\n📦 Tracking ID: ${c.tracking||'[Tracking ID]'}\n🚚 Courier: Delhivery\n⏱ Expected Delivery: 5–7 working days\n\nYou can track your shipment at: https://www.delhivery.com\n\nYour portfolio is already live at: ${c.portfolioUrl||'[Portfolio URL]'}\n\nFeel free to reach out if you need anything at all.\n\nWarm regards,\nYogaprabhu S.\nFounder · Footprint Forge\n+91 99520 41493`,
    }),
    "Complete": (c) => ({
      subject: `Your Footprint Forge Infrastructure is Live! 🚀`,
      body: `Hi ${c.firstName},\n\nYour Footprint Forge build is complete! 🌟\n\nHere's a summary of what we've built together:\n\n🔗 Portfolio: ${c.portfolioUrl||'[Portfolio URL]'}\n💳 PVC QR Card: Delivered\n🏗 Infrastructure: GitHub Pages (permanent, zero cost)\n\nWhenever you need updates to your portfolio — a new role, new projects, or additional sections — just reach out and I'll get it done.\n\nThank you for trusting Footprint Forge with your digital identity. It was a privilege building your infrastructure. 🙏\n\nWarm regards,\nYogaprabhu S.\nFounder · Footprint Forge\n+91 99520 41493\nfootprintforge-hq.github.io`,
    }),
  };

  /* ════════════════════════════════════════════════════════
     MAIN APP
  ════════════════════════════════════════════════════════ */
  function App() {
    const [user,         setUser]         = useState(null);
    const [authLoading,  setAuthLoading]  = useState(true);
    const [loginEmail,   setLoginEmail]   = useState('');
    const [loginPass,    setLoginPass]    = useState('');
    const [loginErr,     setLoginErr]     = useState('');
    const [logging,      setLogging]      = useState(false);
    const [dbError,      setDbError]      = useState('');

    const [clients,      setClients]      = useState([]);
    const [view,         setView]         = useState('dashboard'); // dashboard | pipeline | client
    const [activeClient, setActiveClient] = useState(null);
    const [search,       setSearch]       = useState('');
    const [stageFilter,  setStageFilter]  = useState('All');
    const [showNewForm,  setShowNewForm]  = useState(false);
    const [showInvoice,  setShowInvoice]  = useState(false);
    const [showLetter,   setShowLetter]   = useState(false);
    const [showMsg,      setShowMsg]      = useState(null); // { type:'wa'|'email', stage }
    const [noteText,     setNoteText]     = useState('');
    const [savingNote,   setSavingNote]   = useState(false);
    const [logoUrl,      setLogoUrl]      = useState('logo.webp');

    /* Auth — wait for Firebase module to finish loading */
    useEffect(() => {
      let unsub = null;
      let attempts = 0;
      const tryConnect = () => {
        const auth = window._ffAuth;
        const fns  = window._ffFns;
        if (!auth || !fns?.onAuthStateChanged) {
          if (++attempts < 20) setTimeout(tryConnect, 200); // retry up to 4 seconds
          else { setAuthLoading(false); console.error("Firebase failed to load"); }
          return;
        }
        unsub = fns.onAuthStateChanged(auth, u => {
          setUser(u);
          setAuthLoading(false);
        });
      };
      setTimeout(tryConnect, 200);
      return () => unsub && unsub();
    }, []);

    /* Firestore */
    useEffect(() => {
      const db  = window._ffDb;
      const fns = window._ffFns;
      if(!user || !db || !fns?.collection || !fns?.onSnapshot) return;
      const unsub = fns.onSnapshot(
        fns.collection(db,'ff_clients'),
        snap => {
          const data = snap.docs.map(d=>({id:d.id,...d.data()}));
          data.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
          setClients(data);
          setActiveClient(prev => prev ? (data.find(c=>c.id===prev.id)||prev) : null);
        },
        err => {
          console.error("Firestore Error:", err);
          if(err.code==='permission-denied') {
            setDbError("Database access denied. Check your Firestore rules.");
          } else {
            setDbError(err.message);
          }
        }
      );
      return () => unsub();
    }, [user]);

    const login = async (e) => {
      e.preventDefault(); setLogging(true); setLoginErr('');
      try { await window._ffFns.signInWithEmailAndPassword(window._ffAuth, loginEmail, loginPass); }
      catch { setLoginErr('Invalid credentials. Please try again.'); }
      setLogging(false);
    };

    /* ── Client helpers ── */
    const clientCtx = (c) => ({
      ...c,
      firstName: (c.name||'').split(' ')[0] || 'there',
      tracking: c.trackingId || '',
      portfolioUrl: c.portfolioUrl || '',
    });

    const saveClient = async (data) => {
      const db  = window._ffDb;
      const fns = window._ffFns;
      if(!db||!fns) return;
      try {
        const seq       = String(clients.length + 1).padStart(4,'0');
        const city      = (data.address||'CH').replace(/[^a-zA-Z]/g,'').slice(0,2).toUpperCase()||'CH';
        const clientRef = `FF-${city}-${seq}`;
        const now       = new Date();
        const yymm      = String(now.getFullYear()).slice(-2)+String(now.getMonth()+1).padStart(2,'0');
        const invoiceId = `FF-INV-${yymm}-${seq}`;
        await fns.addDoc(fns.collection(db,'ff_clients'), {
          ...data,
          clientRef,
          invoiceId,
          createdAt: Date.now(),
          stage: 'New Lead',
          timeline: [{type:'stage', text:`Lead added · Ref: ${clientRef}`, ts: Date.now()}],
          notes: []
        });
      } catch(e) { console.error(e); setDbError(e.message); }
    };

    const updateClient = async (id, data) => {
      const db  = window._ffDb;
      const fns = window._ffFns;
      if(!db||!fns) return;
      try {
        await fns.updateDoc(fns.doc(db,'ff_clients',id), data);
      } catch(e) { console.error(e); setDbError(e.message); }
    };

    const updateStage = async (client, newStage) => {
      const entry = { type:'stage', text:`Stage changed to "${newStage}"`, ts: Date.now() };
      const timeline = [...(client.timeline||[]), entry];
      await updateClient(client.id, { stage: newStage, timeline });
    };

    const addNote = async () => {
      if(!noteText.trim()||!activeClient) return;
      setSavingNote(true);
      const entry = { type:'note', text: noteText.trim(), ts: Date.now() };
      const timeline = [...(activeClient.timeline||[]), entry];
      await updateClient(activeClient.id, { timeline });
      setNoteText('');
      setSavingNote(false);
    };

    const deleteClient = async (id) => {
      if(!window.confirm('Delete this client permanently?')) return;
      const db  = window._ffDb;
      const fns = window._ffFns;
      if(!db||!fns) return;
      try {
        await fns.deleteDoc(fns.doc(db,'ff_clients',id));
        if(activeClient?.id===id) { setActiveClient(null); setView('pipeline'); }
      } catch(e) { console.error(e); setDbError(e.message); }
    };

    /* ── Stats ── */
    const wipeData = async () => {
      if(!window.confirm('Delete ALL client data permanently? This cannot be undone.')) return;
      if(window.prompt("Type DELETE to confirm:") !== 'DELETE') return;
      const db=window._ffDb; const fns=window._ffFns; if(!db||!fns) return;
      try {
        await Promise.all(clients.map(c=>fns.deleteDoc(fns.doc(db,'ff_clients',c.id))));
        alert('All data deleted.');
      } catch(e) { console.error(e); alert('Error: '+e.message); }
    };

    const exportCSV = () => {
      if(!clients.length) return alert('No data to export.');
      const headers = ['Name','Email','Mobile','Tier','Price','Stage','Address','Portfolio URL','Tracking ID','Created'];
      const rows = clients.map(c=>[
        `"${c.name||''}"`,`"${c.email||''}"`,`"${c.mobile||''}"`,
        `"${c.tier||''}"`,c.price||0,`"${c.stage||''}"`,
        `"${c.address||''}"`,`"${c.portfolioUrl||''}"`,`"${c.trackingId||''}"`,
        new Date(c.createdAt||Date.now()).toLocaleDateString('en-IN')
      ]);
      const csv = 'data:text/csv;charset=utf-8,'+headers.join(',')+'\n'+rows.map(r=>r.join(',')).join('\n');
      const a = document.createElement('a');
      a.href=encodeURI(csv); a.download=`FF_Clients_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    };

    const stats = useMemo(() => {
      const active = clients.filter(c=>c.stage!=='Complete');
      const complete = clients.filter(c=>c.stage==='Complete');
      const newLeads = clients.filter(c=>c.stage==='New Lead');
      const dispatched = clients.filter(c=>c.stage==='Card Dispatched'||c.stage==='Delivered'||c.stage==='Complete');
      const revenue = clients.filter(c=>c.stage!=='New Lead').reduce((s,c)=>s+(+c.price||0),0);
      return { total:clients.length, active:active.length, complete:complete.length, newLeads:newLeads.length, dispatched:dispatched.length, revenue };
    }, [clients]);

    /* ── Filtered clients ── */
    const filtered = useMemo(() => {
      let r = clients;
      if(stageFilter!=='All') r = r.filter(c=>c.stage===stageFilter);
      if(search.trim()) {
        const q = search.toLowerCase();
        r = r.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q)||(c.mobile||'').includes(q));
      }
      return r;
    }, [clients, stageFilter, search]);

    /* ════════════════════════
       AUTH SCREEN
    ════════════════════════ */
    if(authLoading) return (

  /* ════════════════════════════════════════════════════════
     CLIENT DETAIL
  ════════════════════════════════════════════════════════ */
  function ClientDetail({ client, updateClient, updateStage, deleteClient, addNote, noteText, setNoteText, savingNote, setShowMsg, setShowInvoice, setShowLetter, logoUrl, setLogoUrl }) {
    const [editing,    setEditing]    = useState(false);
    const [editData,   setEditData]   = useState({});
    const [activeTab,  setActiveTab]  = useState('overview'); // overview | brief | timeline
    const [brief,      setBrief]      = useState({});
    const [savingBrief,setSavingBrief]= useState(false);
    const [briefSaved, setBriefSaved] = useState(false);
    const [confirmDel, setConfirmDel] = useState(false);
    const c = client;
    const ctx = { ...c, firstName:(c.name||'').split(' ')[0]||'there' };

    // Sync brief from client data when client changes
    useEffect(() => {
      setBrief(c.brief || {});
      setConfirmDel(false); // Reset delete state if switching clients
    }, [c.id]);

    const saveBrief = async () => {
      setSavingBrief(true);
      const entry = { type:'note', text:'Portfolio brief updated', ts: Date.now() };
      const timeline = [...(c.timeline||[]), entry];
      await updateClient(c.id, { brief, timeline });
      setSavingBrief(false);
      setBriefSaved(true);
      setTimeout(() => setBriefSaved(false), 2500);
    };

    const updBrief = (k, v) => setBrief(p => ({...p, [k]: v}));

    const startEdit = () => { setEditData({name:c.name,email:c.email,mobile:c.mobile,tier:c.tier,price:c.price,trackingId:c.trackingId,portfolioUrl:c.portfolioUrl,address:c.address}); setEditing(true); };
    const saveEdit = async () => { await updateClient(c.id, editData); setEditing(false); };

    const tl = [...(c.timeline||[])].reverse();
    const currentStageIdx = STAGES.findIndex(s=>s.id===c.stage);
    const nextStage = STAGES[currentStageIdx+1];

    const hasWaTemplate = !!WA_TEMPLATES[c.stage];
    const hasEmailTemplate = !!EMAIL_TEMPLATES[c.stage];

    return (

    const [data, setData] = useState({ name:'', email:'', mobile:'', address:'', tier:'The Authority', price:1499 });
    const [saving, setSaving] = useState(false);
    const [err, setErr] = useState('');

      setSaving(true);
      await onSave(data);
      setSaving(false);
      onClose();
    };

    return (
      <div className="modal-bg" onClick={onClose}>
        <div onClick={e=>e.stopPropagation()} style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:16,padding:24,width:'100%',maxWidth:460,maxHeight:'90vh',overflowY:'auto'}} className="fade-up">

          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {[
              {k:'name',   label:'Full Name *',  type:'text',  req:true},
              {k:'email',  label:'Email',        type:'email', req:false},
              {k:'mobile', label:'Mobile (WhatsApp)', type:'tel', req:false},
              {k:'address',label:'Address',       type:'text',  req:false},
            ].map(f=>(

              <label style={{display:'block',fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:5,fontFamily:'DM Mono'}}>Price (₹)</label>

          <div style={{display:'flex',gap:8,marginTop:20}}>
            <button onClick={save} disabled={saving} className="btn-gold" style={{flex:1,justifyContent:'center',opacity:saving?.6:1}}>

            <button onClick={onClose} className="btn-ghost" style={{justifyContent:'center',padding:'10px 20px'}}>Cancel</button>
          </div>

    );

  /* ════════════════════════════════════════════════════════
     MESSAGE MODAL — preview + send
  ════════════════════════════════════════════════════════ */
  function MsgModal({ client, config, onClose }) {
    const isWa = config.type === 'wa';
    const template = isWa ? WA_TEMPLATES[config.stage] : EMAIL_TEMPLATES[config.stage];
    const content = template ? template(client) : null;
    const [copied, setCopied] = useState(false);

    const copy = () => {
      const text = isWa ? content : `${content?.subject}\n\n${content?.body}`;
      navigator.clipboard.writeText(text||'').then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
    };

    if(!content) return null;

    return (
      <div className="modal-bg" onClick={onClose}>
        <div onClick={e=>e.stopPropagation()} style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:16,padding:24,width:'100%',maxWidth:520,maxHeight:'90vh',overflowY:'auto'}} className="fade-up">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h3 style={{fontSize:15,fontWeight:800,color:'var(--text)'}}>
              {isWa ? <><i className="fa-brands fa-whatsapp" style={{color:'#4ade80',marginRight:8}}></i>WhatsApp Message</> : <><i className="fa-solid fa-envelope" style={{color:'#60a5fa',marginRight:8}}></i>Email Template</>}
            </h3>
            <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:18}}><i className="fa-solid fa-xmark"></i></button>
          </div>
          <p className="mono" style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:12}}>Stage: {config.stage} · To: {client.name}</p>

          {isWa ? (
            <pre style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,padding:14,fontSize:12,color:'var(--text)',lineHeight:1.7,whiteSpace:'pre-wrap',wordBreak:'break-word',marginBottom:16,fontFamily:'DM Mono'}}>{content}</pre>
          ) : (
            <div style={{marginBottom:16}}>
              <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,padding:14,marginBottom:8}}>
                <p className="mono" style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',marginBottom:4}}>Subject</p>
                <p style={{fontSize:12,color:'var(--text)',fontWeight:600}}>{content.subject}</p>
              </div>
              <pre style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,padding:14,fontSize:12,color:'var(--text)',lineHeight:1.7,whiteSpace:'pre-wrap',wordBreak:'break-word',fontFamily:'DM Mono'}}>{content.body}</pre>
            </div>
          )}

          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {isWa && client.mobile ? (
              <a href={wa(client.mobile, content)} target="_blank" rel="noopener noreferrer"
                style={{display:'flex',alignItems:'center',gap:8,background:'rgba(74,222,128,.15)',border:'1px solid rgba(74,222,128,.3)',color:'#4ade80',borderRadius:10,padding:'10px 16px',textDecoration:'none',fontSize:12,fontWeight:700,fontFamily:'Syne'}}>
                <i className="fa-brands fa-whatsapp"></i> Open in WhatsApp
              </a>
            ) : client.email ? (
              <a href={mail(client.email, content.subject, content.body)} target="_blank" rel="noopener noreferrer"
                style={{display:'flex',alignItems:'center',gap:8,background:'rgba(59,130,246,.15)',border:'1px solid rgba(59,130,246,.3)',color:'#60a5fa',borderRadius:10,padding:'10px 16px',textDecoration:'none',fontSize:12,fontWeight:700,fontFamily:'Syne'}}>
                <i className="fa-solid fa-envelope"></i> Open in Mail
              </a>
            ) : null}
            <button onClick={copy} className="btn-ghost" style={{fontSize:12,padding:'10px 16px'}}>
              {copied ? <><i className="fa-solid fa-check" style={{color:'#4ade80'}}></i> Copied!</> : <><i className="fa-solid fa-copy"></i> Copy</>}
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ════════════════════════════════════════════════════════
     INVOICE MODAL — printable A4
  ════════════════════════════════════════════════════════ */
  function InvoiceModal({ client: c, onClose, logoUrl }) {
    const today   = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
    const fullAddr = [c.address].filter(Boolean).join(', ');

    // Generate IDs if missing (legacy clients) and patch Firestore once
    const [invNo, setInvNo] = React.useState(c.invoiceId||null);
    const [ref,   setRef]   = React.useState(c.clientRef||null);

    React.useEffect(()=>{
      if(c.invoiceId && c.clientRef) return; // already set
      const db=window._ffDb; const fns=window._ffFns; if(!db||!fns) return;
      const now  = new Date();
      const yymm = String(now.getFullYear()).slice(-2)+String(now.getMonth()+1).padStart(2,'0');
      const seq  = String(Math.floor(1000+Math.random()*8999));
      const city = (c.address||'CH').replace(/[^a-zA-Z]/g,'').slice(0,2).toUpperCase()||'CH';
      const newRef = c.clientRef || `FF-${city}-${seq}`;
      const newInv = c.invoiceId || `FF-INV-${yymm}-${seq}`;
      setRef(newRef); setInvNo(newInv);
      fns.updateDoc(fns.doc(db,'ff_clients',c.id),{clientRef:newRef,invoiceId:newInv});
    },[c.id]);

    const waInvoice = c.mobile ? wa(c.mobile,
      `Hi ${(c.name||'').split(' ')[0]}, here are your invoice details from Footprint Forge:\n\n` +
      `📋 Invoice: ${invNo}\n💰 Amount Due: ${fmt(c.price||0)}\n📅 Date: ${today}\n\n` +
      `Please process the payment at your earliest convenience.\n\nThank you!\nYogaprabhu S.\nFootprint Forge · +91 99520 41493`
    ) : null;
