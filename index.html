                        <div>
                          <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Mobile Number (WhatsApp)</label>
                          <input required type="tel" value={leadData.mobile} onChange={e => setLeadData({...leadData, mobile: e.target.value})} className="w-full bg-black/50 border border-white/10 text-white text-sm p-3 rounded-lg outline-none focus:border-[#c27e42] transition-colors" placeholder="+91 98765 43210" />
                        </div>
                      </div>

                      <div className="border-t border-white/10 pt-6 mt-2">
                        <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Hardware Shipping Address</label>
                        <div className="space-y-4">
                          <input required type="text" value={leadData.addressLine1} onChange={e => setLeadData({...leadData, addressLine1: e.target.value})} className="w-full bg-black/50 border border-white/10 text-white text-sm p-3 rounded-lg outline-none focus:border-[#c27e42] transition-colors" placeholder="Address Line 1" />
                          <input type="text" value={leadData.addressLine2} onChange={e => setLeadData({...leadData, addressLine2: e.target.value})} className="w-full bg-black/50 border border-white/10 text-white text-sm p-3 rounded-lg outline-none focus:border-[#c27e42] transition-colors" placeholder="Address Line 2 (Optional)" />
                          <input required type="text" value={leadData.cityStateZip} onChange={e => setLeadData({...leadData, cityStateZip: e.target.value})} className="w-full bg-black/50 border border-white/10 text-white text-sm p-3 rounded-lg outline-none focus:border-[#c27e42] transition-colors" placeholder="City, State, Pincode" />
                        </div>
                      </div>

                      <button 
                        type="submit" 
                        disabled={formStatus === 'submitting'}
                        className="w-full mt-4 bg-gradient-to-r from-[#e6b981] to-[#c27e42] hover:opacity-90 text-[#05080f] font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(194,126,66,0.2)] transition-all flex items-center justify-center gap-2 disabled:opacity-70"
                      >
                        {formStatus === 'submitting' ? <><i className="fa-solid fa-circle-notch fa-spin"></i> Transmitting...</> : "Submit Implementation Request"}
                      </button>
                      <p className="text-center text-[10px] text-slate-500 font-mono mt-4">By submitting, you acknowledge the 50% non-refundable advance terms.</p>
                    </form>
                  )}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
