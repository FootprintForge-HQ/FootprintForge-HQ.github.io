<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Footprint Forge | Invoice Generator</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Inter', sans-serif;
      margin: 0;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }

    /* A4 Paper Dimensions and Styling */
    .a4-paper {
      width: 210mm;
      height: 297mm;
      background-color: #ffffff;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0,0,0,0.05);
      position: relative;
      box-sizing: border-box;
      padding: 20mm;
    }

    .font-serif { font-family: 'Playfair Display', serif; }

    /* Copper Accent */
    .copper-text { color: #c27e42; }
    .bg-copper { background-color: #c27e42; }
    .border-copper { border-color: #c27e42; }

    /* Print Specific Styles */
    @media print {
      body {
        background-color: transparent !important;
        margin: 0;
      }
      .no-print { display: none !important; }
      
      .a4-paper {
        margin: 0 !important;
        box-shadow: none !important;
        border: none !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      @page {
        size: A4 portrait;
        margin: 0; 
      }
    }
  </style>
</head>
<body>
  <div id="root" class="w-full min-h-screen"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PREDEFINED_PRODUCTS = [
      { name: "The Executive Portfolio", rate: 1499, discount: 500 },
      { name: "The Authority Portfolio", rate: 2499, discount: 1000 },
      { name: "The Institution Portfolio", rate: 5999, discount: 2500 },
      { name: "Extra Premium PVC QR Card", rate: 499, discount: 0 },
      { name: "Premium PVC QR Card (Standard Issue)", rate: 0, discount: 0 }
    ];

    function InvoiceGenerator() {
      // Default Invoice State
      const [invoiceDetails, setInvoiceDetails] = useState({
        invoiceNo: "INV-260042",
        date: new Date().toISOString().split('T')[0],
        dueDate: new Date().toISOString().split('T')[0],
        clientName: "Alexander Chen",
        clientAddress: "Level 4, Marina Towers\nEgmore, Chennai, TN 600008\nIndia",
        notes: "Thank you for partnering with Footprint Forge. Please process payment upon receipt via NEFT/RTGS to HDFC Bank A/c: 50100XXXXXXXXX, IFSC: HDFC0001234."
      });

      const [items, setItems] = useState([
        { id: 1, desc: "The Authority Portfolio", qty: 1, rate: 2499, discount: 1000 },
        { id: 2, desc: "Premium PVC QR Card (Standard Issue)", qty: 1, rate: 0, discount: 0 }
      ]);

      const [logoUrl, setLogoUrl] = useState("1000441850.png");
      const [activeTab, setActiveTab] = useState('edit');
      
      // Viewport Scaling State
      const previewContainerRef = useRef(null);
      const [scale, setScale] = useState(1);

      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setLogoUrl(event.target.result);
          reader.readAsDataURL(file);
        }
      };

      const handlePrint = () => {
        window.print();
      };

      // Item Management
      const addItem = () => {
        setItems([...items, { id: Date.now(), desc: "Custom Line Item", qty: 1, rate: 0, discount: 0 }]);
      };

      const removeItem = (idToRemove) => {
        setItems(items.filter(item => item.id !== idToRemove));
      };

      const updateItem = (id, field, value) => {
        setItems(items.map(item => 
          item.id === id ? { ...item, [field]: value } : item
        ));
      };

      // Calculations
      const subtotal = items.reduce((sum, item) => sum + (Number(item.qty) * Number(item.rate)), 0);
      const totalDiscount = items.reduce((sum, item) => sum + (Number(item.qty) * Number(item.discount || 0)), 0);
      const total = subtotal - totalDiscount;

      // Currency Formatter
      const formatCurrency = (num) => {
        return new Intl.NumberFormat('en-IN', {
          style: 'currency',
          currency: 'INR',
          minimumFractionDigits: 2
        }).format(num);
      };

      // Date Formatter
      const formatDate = (dateString) => {
        if (!dateString) return "";
        return new Date(dateString).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      };

      // Dynamic viewport scaling engine
      useEffect(() => {
        const handleResize = () => {
          if (previewContainerRef.current) {
            const containerWidth = previewContainerRef.current.clientWidth;
            const a4WidthPx = 794; // approx 210mm in pixels
            const padding = 32; 
            
            if (containerWidth < a4WidthPx + padding) {
              setScale((containerWidth - padding) / a4WidthPx);
            } else {
              setScale(1);
            }
          }
        };

        handleResize();
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [activeTab]);

      return (
        <div className="flex flex-col lg:flex-row w-full min-h-screen relative">
          
          {/* LEFT: CONTROL PANEL */}
          <div className={`no-print w-full lg:w-[450px] bg-white border-r border-gray-200 p-6 flex flex-col min-h-screen overflow-y-auto shadow-xl z-10 shrink-0 pb-28 lg:pb-6 ${activeTab === 'edit' ? 'flex' : 'hidden lg:flex'}`}>
            <div className="flex items-center gap-3 mb-8">
              <div className="w-10 h-10 rounded-full bg-black flex items-center justify-center border border-[#c27e42]">
                <i className="fa-solid fa-file-invoice text-[#c27e42]"></i>
              </div>
              <div>
                <h1 className="text-sm font-bold tracking-widest uppercase">Invoice Generator</h1>
                <p className="text-xs text-gray-500 font-mono">Dynamic Billing Tool</p>
              </div>
            </div>

            <div className="space-y-6 flex-1">
              
              {/* Meta Details */}
              <div className="grid grid-cols-3 gap-4">
                <div>
                  <label className="block text-[10px] font-bold text-gray-700 uppercase tracking-wide mb-1">Invoice No.</label>
                  <input type="text" value={invoiceDetails.invoiceNo} onChange={(e) => setInvoiceDetails({...invoiceDetails, invoiceNo: e.target.value})} className="w-full text-sm p-2 border border-gray-300 rounded outline-none font-mono" />
                </div>
                <div>
                  <label className="block text-[10px] font-bold text-gray-700 uppercase tracking-wide mb-1">Issue Date</label>
                  <input type="date" value={invoiceDetails.date} onChange={(e) => setInvoiceDetails({...invoiceDetails, date: e.target.value})} className="w-full text-sm p-2 border border-gray-300 rounded outline-none" />
                </div>
                <div>
                  <label className="block text-[10px] font-bold text-gray-700 uppercase tracking-wide mb-1">Due Date</label>
                  <input type="date" value={invoiceDetails.dueDate} onChange={(e) => setInvoiceDetails({...invoiceDetails, dueDate: e.target.value})} className="w-full text-sm p-2 border border-gray-300 rounded outline-none" />
                </div>
              </div>

              {/* Client Details */}
              <div className="pt-4 border-t border-gray-100">
                <label className="block text-xs font-bold text-[#c27e42] uppercase tracking-wide mb-3"><i className="fa-solid fa-user-tie"></i> Bill To</label>
                <div className="space-y-3">
                  <input type="text" placeholder="Client / Company Name" value={invoiceDetails.clientName} onChange={(e) => setInvoiceDetails({...invoiceDetails, clientName: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded font-bold outline-none" />
                  <textarea placeholder="Billing Address" value={invoiceDetails.clientAddress} onChange={(e) => setInvoiceDetails({...invoiceDetails, clientAddress: e.target.value})} className="w-full text-sm p-2.5 border border-gray-300 rounded outline-none resize-none h-20 leading-relaxed"></textarea>
                </div>
              </div>

              {/* Line Items */}
              <div className="pt-4 border-t border-gray-100">
                <div className="flex justify-between items-center mb-3">
                  <label className="block text-xs font-bold text-[#c27e42] uppercase tracking-wide"><i className="fa-solid fa-list-check"></i> Line Items</label>
                  <button onClick={addItem} className="text-[10px] bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-1 px-2 rounded transition-colors uppercase tracking-widest">
                    + Add Item
                  </button>
                </div>
                
                <div className="space-y-4">
                  {items.map((item, index) => {
                    const isPredefined = PREDEFINED_PRODUCTS.some(p => p.name === item.desc);
                    
                    return (
                      <div key={item.id} className="bg-gray-50 border border-gray-200 p-3 rounded-lg flex flex-col gap-2 relative group">
                        {items.length > 1 && (
                          <button onClick={() => removeItem(item.id)} className="absolute -top-2 -right-2 w-5 h-5 bg-red-100 hover:bg-red-500 hover:text-white text-red-500 rounded-full flex items-center justify-center text-[10px] transition-colors border border-red-200 z-10">
                            <i className="fa-solid fa-xmark"></i>
                          </button>
                        )}
                        
                        {/* Product Dropdown Selector */}
                        <select 
                          value={isPredefined ? item.desc : "Custom Line Item"}
                          onChange={(e) => {
                            const selectedName = e.target.value;
                            if (selectedName === "Custom Line Item") {
                              updateItem(item.id, 'desc', "");
                            } else {
                              const prod = PREDEFINED_PRODUCTS.find(p => p.name === selectedName);
                              updateItem(item.id, 'desc', prod.name);
                              updateItem(item.id, 'rate', prod.rate);
                              updateItem(item.id, 'discount', prod.discount);
                            }
                          }}
                          className="w-full text-xs p-2 border border-gray-300 rounded outline-none bg-white font-medium text-gray-800"
                        >
                          <option value="Custom Line Item">Custom Line Item</option>
                          {PREDEFINED_PRODUCTS.map(p => (
                            <option key={p.name} value={p.name}>{p.name}</option>
                          ))}
                        </select>

                        {/* Show Custom Description Input ONLY if not a predefined product */}
                        {!isPredefined && (
                          <input 
                            type="text" 
                            placeholder="Custom Description" 
                            value={item.desc} 
                            onChange={(e) => updateItem(item.id, 'desc', e.target.value)} 
                            className="w-full text-xs p-2 border border-gray-300 rounded outline-none" 
                          />
                        )}

                        <div className="flex gap-2 mt-1">
                          <div className="flex-1">
                            <span className="text-[9px] text-gray-500 font-bold uppercase ml-1">Qty</span>
                            <input type="number" min="1" value={item.qty} onChange={(e) => updateItem(item.id, 'qty', e.target.value)} className="w-full text-xs p-2 border border-gray-300 rounded outline-none font-mono" />
                          </div>
                          <div className="flex-1">
                            <span className="text-[9px] text-gray-500 font-bold uppercase ml-1">Rate (₹)</span>
                            <input type="number" min="0" value={item.rate} onChange={(e) => updateItem(item.id, 'rate', e.target.value)} className="w-full text-xs p-2 border border-gray-300 rounded outline-none font-mono" />
                          </div>
                          <div className="flex-1">
                            <span className="text-[9px] text-copper font-bold uppercase ml-1">Discount (₹)</span>
                            <input type="number" min="0" value={item.discount || 0} onChange={(e) => updateItem(item.id, 'discount', e.target.value)} className="w-full text-xs p-2 border border-copper bg-[#c27e42]/5 rounded outline-none font-mono text-copper" />
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Notes */}
              <div className="pt-4 border-t border-gray-100">
                <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-2">Payment Notes</label>
                <textarea value={invoiceDetails.notes} onChange={(e) => setInvoiceDetails({...invoiceDetails, notes: e.target.value})} className="w-full text-xs p-2.5 border border-gray-300 rounded outline-none resize-none h-16 leading-relaxed"></textarea>
              </div>

              {/* Logo Upload */}
              <div className="pt-4 border-t border-gray-100">
                <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-2">Invoice Logo</label>
                <input type="file" accept="image/*" onChange={handleLogoUpload} className="w-full text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-[#c27e42]/10 file:text-[#c27e42] hover:file:bg-[#c27e42]/20 cursor-pointer outline-none" />
              </div>
            </div>

            <div className="mt-8 pt-6 border-t border-gray-200">
              <button onClick={handlePrint} className="w-full bg-[#c27e42] hover:bg-[#a66731] text-white font-bold uppercase tracking-wider py-3.5 rounded shadow-lg transition-colors flex justify-center items-center gap-2">
                <i className="fa-solid fa-print"></i> Print Invoice
              </button>
            </div>
          </div>

          {/* RIGHT: A4 PREVIEW */}
          <div 
            ref={previewContainerRef} 
            className={`flex-1 bg-gray-100 overflow-y-auto flex-col items-center pt-8 pb-28 lg:pb-10 print:!block print:!p-0 print:!bg-white ${activeTab === 'preview' ? 'flex' : 'hidden lg:flex'}`}
          >
            <div 
              style={{ 
                transform: `scale(${scale})`, 
                transformOrigin: 'top center',
                marginBottom: scale < 1 ? `-${297 * (1 - scale)}mm` : '0' 
              }}
              className="print:!transform-none print:!m-0 transition-transform duration-200"
            >
              <div className="a4-paper text-black relative flex flex-col">
                
                {/* --- INVOICE HEADER --- */}
                <div className="flex justify-between items-start mb-12">
                  <div className="flex items-center gap-4">
                    <div className="w-16 h-16 rounded-full border-2 border-copper overflow-hidden flex items-center justify-center bg-[#111]">
                      <img src={logoUrl} alt="Logo" className="w-full h-full object-cover" onError={(e) => { e.target.style.display='none'; e.target.parentNode.innerHTML='<i class="fa-solid fa-fingerprint text-[#c27e42] text-2xl"></i>'; }} />
                    </div>
                    <div>
                      <h1 className="text-2xl font-bold tracking-[0.2em] text-[#111] uppercase leading-none mb-1">Footprint Forge</h1>
                      <p className="text-[10px] text-gray-500 font-mono tracking-widest uppercase">Identity Infrastructure</p>
                    </div>
                  </div>
                  
                  <div className="text-right">
                    <h2 className="font-serif text-4xl text-[#111] uppercase tracking-wider mb-2">Invoice</h2>
                    <p className="text-[10px] text-gray-600 font-mono uppercase tracking-widest bg-gray-100 px-2 py-1 inline-block rounded border border-gray-200">
                      {invoiceDetails.invoiceNo}
                    </p>
                  </div>
                </div>

                {/* --- ADDRESSES & META --- */}
                <div className="flex justify-between items-start mb-12 border-b border-gray-200 pb-8">
                  {/* From */}
                  <div className="w-1/3">
                    <p className="text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-2">From</p>
                    <p className="font-mono text-xs text-gray-700 leading-relaxed">
                      362, L Block, West Cementry Road<br/>
                      Oldwashermenpet, Chennai-600021<br/>
                      Ph: +919952041493<br/>
                      MSME: UDYAM-TN-02-0455866<br/>
                      footprintforge-hq.github.io
                    </p>
                  </div>
                  
                  {/* To */}
                  <div className="w-1/3 border-l-2 border-copper pl-4">
                    <p className="text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-2">Billed To</p>
                    <h3 className="font-serif font-bold text-lg text-[#1a1a1a] mb-1">{invoiceDetails.clientName}</h3>
                    <p className="font-mono text-xs text-gray-600 leading-relaxed whitespace-pre-wrap">
                      {invoiceDetails.clientAddress}
                    </p>
                  </div>

                  {/* Dates */}
                  <div className="w-1/4 text-right flex flex-col gap-4">
                    <div>
                      <p className="text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-1">Date of Issue</p>
                      <p className="font-mono text-sm font-semibold text-gray-800">{formatDate(invoiceDetails.date)}</p>
                    </div>
                    <div>
                      <p className="text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-1">Due Date</p>
                      <p className="font-mono text-sm font-semibold text-copper">{formatDate(invoiceDetails.dueDate)}</p>
                    </div>
                  </div>
                </div>

                {/* --- LINE ITEMS TABLE --- */}
                <div className="flex-1">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr>
                        <th className="py-3 px-2 border-b-2 border-gray-800 text-[10px] uppercase tracking-widest text-gray-500 font-bold w-5/12">Description</th>
                        <th className="py-3 px-2 border-b-2 border-gray-800 text-[10px] uppercase tracking-widest text-gray-500 font-bold text-center w-1/12">Qty</th>
                        <th className="py-3 px-2 border-b-2 border-gray-800 text-[10px] uppercase tracking-widest text-gray-500 font-bold text-right w-2/12">Rate</th>
                        <th className="py-3 px-2 border-b-2 border-gray-800 text-[10px] uppercase tracking-widest text-copper font-bold text-right w-2/12">Discount</th>
                        <th className="py-3 px-2 border-b-2 border-gray-800 text-[10px] uppercase tracking-widest text-gray-500 font-bold text-right w-2/12">Amount</th>
                      </tr>
                    </thead>
                    <tbody>
                      {items.map((item, index) => (
                        <tr key={item.id}>
                          <td className="py-4 px-2 border-b border-gray-100 text-sm text-gray-800 font-medium">{item.desc || "Item Description"}</td>
                          <td className="py-4 px-2 border-b border-gray-100 text-sm text-gray-600 font-mono text-center">{item.qty}</td>
                          <td className="py-4 px-2 border-b border-gray-100 text-sm text-gray-600 font-mono text-right">{formatCurrency(item.rate)}</td>
                          <td className="py-4 px-2 border-b border-gray-100 text-sm text-copper font-mono text-right">{item.discount > 0 ? `-${formatCurrency(item.discount)}` : '-'}</td>
                          <td className="py-4 px-2 border-b border-gray-100 text-sm font-mono font-semibold text-gray-900 text-right">{formatCurrency((item.rate - (item.discount || 0)) * item.qty)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {/* --- TOTALS --- */}
                <div className="w-full flex justify-end mt-8 mb-12">
                  <div className="w-1/2 md:w-[45%]">
                    <div className="flex justify-between py-2 border-b border-gray-100">
                      <span className="text-xs text-gray-500 uppercase tracking-widest font-bold">Subtotal</span>
                      <span className="font-mono text-sm text-gray-800">{formatCurrency(subtotal)}</span>
                    </div>
                    {totalDiscount > 0 && (
                      <div className="flex justify-between py-2 border-b border-gray-100">
                        <span className="text-xs text-copper uppercase tracking-widest font-bold">Total Savings</span>
                        <span className="font-mono text-sm text-copper font-bold">-{formatCurrency(totalDiscount)}</span>
                      </div>
                    )}
                    <div className="flex justify-between py-4 border-t-2 border-b-2 border-gray-800 mt-1">
                      <span className="text-sm font-bold text-[#111] uppercase tracking-widest">Total Due</span>
                      <span className="font-mono text-xl font-bold copper-text">{formatCurrency(total)}</span>
                    </div>
                  </div>
                </div>

                {/* --- FOOTER & NOTES --- */}
                <div className="mt-auto pt-8 border-t border-gray-200 flex justify-between items-end">
                  <div className="w-2/3">
                    <p className="text-[10px] uppercase tracking-widest text-copper font-bold mb-2">Payment Terms & Notes</p>
                    <p className="text-xs text-gray-600 leading-relaxed font-light whitespace-pre-wrap">{invoiceDetails.notes}</p>
                  </div>
                  
                  <div className="text-right flex flex-col items-end">
                    <div className="h-12 w-32 border-b border-dashed border-gray-400 mb-2 flex items-center justify-center opacity-30 relative">
                       {/* Faux Seal / Signature area */}
                       <div className="absolute w-12 h-12 rounded-full border border-copper bg-black overflow-hidden left-0 mix-blend-multiply opacity-20">
                          <img src={logoUrl} alt="Seal" className="w-full h-full object-cover" onError={(e) => e.target.style.display='none'} />
                       </div>
                    </div>
                    <p className="text-[10px] uppercase tracking-widest text-gray-800 font-bold">Authorized Signatory</p>
                    <p className="text-[8px] font-mono text-gray-500 mt-1">Footprint Forge</p>
                  </div>
                </div>

              </div>
            </div>
          </div>

          {/* MOBILE STICKY BOTTOM NAVIGATION */}
          <div className="lg:hidden no-print fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 flex gap-3 z-50 shadow-[0_-4px_15px_rgba(0,0,0,0.05)]">
            {activeTab === 'edit' ? (
              <button onClick={() => setActiveTab('preview')} className="flex-1 bg-gray-900 hover:bg-black text-white py-3 rounded-lg font-bold tracking-wide transition-colors">
                Preview Invoice
              </button>
            ) : (
              <>
                <button onClick={() => setActiveTab('edit')} className="flex-1 border border-gray-300 text-gray-700 py-3 rounded-lg font-bold tracking-wide">
                  Edit Details
                </button>
                <button onClick={handlePrint} className="flex-1 bg-[#c27e42] text-white py-3 rounded-lg font-bold tracking-wide flex items-center justify-center gap-2 shadow-lg shadow-[#c27e42]/20">
                  <i className="fa-solid fa-print"></i> Print
                </button>
              </>
            )}
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<InvoiceGenerator />);
  </script>
</body>
</html>
